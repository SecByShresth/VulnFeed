name: Database Vulnerabilities Feed

on:
  schedule:
    - cron: '0 0 * * *' # runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-database-vulns:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install requests

      - name: 🌐 Fetch Last 100 Vulnerabilities (MySQL, PostgreSQL, Redis)
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          from datetime import datetime

          # === Configuration ===
          OUTPUT_DIR = "data"
          os.makedirs(OUTPUT_DIR, exist_ok=True)

          DATABASES = {
              "mysql": ["mysql", "mariadb", "percona"],
              "postgresql": ["postgres", "postgresql", "pgsql"],
              "redis": ["redis"]
          }

          def fetch_vulns(keyword):
              """Fetch up to 100 most recent vulnerabilities for a given keyword."""
              print(f"🔍 Fetching recent vulnerabilities for '{keyword}'...")
              url = "https://api.osv.dev/v1/query"
              payload = {
                  "query": keyword,
                  "limit": 100,
                  "sort": "published"
              }
              try:
                  r = requests.post(url, json=payload, timeout=30)
                  r.raise_for_status()
                  data = r.json().get("vulns", [])
                  print(f"✅ {keyword}: {len(data)} entries fetched.")
                  return data
              except Exception as e:
                  print(f"⚠️ Error fetching {keyword}: {e}")
                  return []

          def normalize_entry(vuln):
              """Normalize the vulnerability structure."""
              vid = vuln.get("id", "")
              title = vuln.get("summary") or vuln.get("details", "").split("\n")[0][:120]
              description = vuln.get("details", "No description available.")
              published = vuln.get("published") or vuln.get("modified") or ""
              aliases = vuln.get("aliases", [])
              affected_pkgs = []

              for a in vuln.get("affected", []):
                  pkg = a.get("package", {}).get("name")
                  if pkg:
                      affected_pkgs.append(pkg)

              return {
                  "id": vid,
                  "title": title,
                  "description": description,
                  "published_date": published,
                  "url": f"https://osv.dev/{vid}",
                  "aliases": aliases,
                  "affected_packages": affected_pkgs
              }

          all_results = {}

          for db_name, keywords in DATABASES.items():
              collected = []
              for kw in keywords:
                  vulns = fetch_vulns(kw)
                  for v in vulns:
                      entry = normalize_entry(v)
                      entry["source"] = db_name
                      collected.append(entry)

              # Deduplicate by vulnerability ID
              unique_vulns = {v["id"]: v for v in collected}.values()
              sorted_vulns = sorted(unique_vulns, key=lambda x: x["published_date"] or "", reverse=True)
              all_results[db_name] = sorted_vulns[:100]

              # Save individual file
              file_path = os.path.join(OUTPUT_DIR, f"{db_name}.json")
              with open(file_path, "w") as f:
                  json.dump(sorted_vulns[:100], f, indent=2)
              print(f"💾 Saved {len(sorted_vulns)} entries to {file_path}")

          # Summary print
          print("\n📊 Summary:")
          for db, vulns in all_results.items():
              print(f"   {db.upper()}: {len(vulns)} vulnerabilities")

          print("🎉 Vulnerability feed update complete.")
          EOF

      - name: 📊 Show Summary
        run: |
          echo "=== Database Files Generated ==="
          for f in data/*.json; do
            [ -f "$f" ] && echo "$(basename $f): $(jq 'length' $f) entries"
          done
          echo ""
          echo "=== Sample Entries ==="
          for f in data/*.json; do
            echo "$(basename $f):"
            jq -r '.[0] | "  ID: \(.id)\n  Published: \(.published_date)\n  Title: \(.title)\n  URL: \(.url)\n"' $f || echo "No data"
            echo ""
          done

      - name: 💾 Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin
          git reset --hard origin/main

          git add data/mysql.json data/postgresql.json data/redis.json

          if git diff --staged --quiet; then
            echo "ℹ️ No new vulnerabilities found."
          else
            MYSQL=$(jq 'length' data/mysql.json)
            POSTGRES=$(jq 'length' data/postgresql.json)
            REDIS=$(jq 'length' data/redis.json)
            TOTAL=$((MYSQL + POSTGRES + REDIS))
            git commit -m "🔄 Update database feeds (Total: $TOTAL | MySQL: $MYSQL | PostgreSQL: $POSTGRES | Redis: $REDIS) - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Database vulnerability data updated successfully."
          fi
