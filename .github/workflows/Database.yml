name: Database

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: 🌐 Fetch and Process Database Vulnerabilities from OSV.dev
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          import zipfile
          import io
          import re
          from datetime import datetime
          
          print("🚀 Starting OSV.dev DATABASE vulnerability feed update...")
          
          # Configuration - Using OSV export endpoints
          OSV_EXPORT_URL = "https://osv-vulnerabilities.storage.googleapis.com"
          
          # Focus on ecosystems most likely to have DB-related vulnerabilities
          ECOSYSTEMS = ["Go", "PyPI", "npm", "Maven", "NuGet", "RubyGems", "Packagist", "crates.io"]
          
          # Database keywords only
          TARGET_KEYWORDS = {
              "mysql": ["mysql", "mariadb", "percona"],
              "postgresql": ["postgres", "postgresql", "pgsql"],
              "redis": ["redis"]
          }
          
          def contains_keyword(text, keywords):
              """Check if text contains any of the keywords with word boundaries"""
              if not text or not keywords:
                  return False
              text_lower = text.lower()
              for keyword in keywords:
                  # Use word boundaries to avoid partial matches
                  if re.search(r'\b' + re.escape(keyword) + r'\b', text_lower):
                      return True
              return False
          
          def extract_published_date(vuln_data):
              """Extract published date from OSV vulnerability data"""
              # Try published field first
              published = vuln_data.get('published')
              if published:
                  try:
                      return datetime.fromisoformat(published.replace('Z', '+00:00'))
                  except (ValueError, TypeError):
                      pass
              
              # Try modified field as fallback
              modified = vuln_data.get('modified')
              if modified:
                  try:
                      return datetime.fromisoformat(modified.replace('Z', '+00:00'))
                  except (ValueError, TypeError):
                      pass
              
              # If no date found, use a very old date so it appears at the bottom
              return datetime(2000, 1, 1)
          
          def process_vulnerability(vuln_data, all_vulnerabilities):
              """Process a single vulnerability and add to results if it matches our criteria"""
              
              vuln_id = vuln_data.get('id', '')
              summary = vuln_data.get('summary', '')
              details = vuln_data.get('details', '')
              aliases = vuln_data.get('aliases', [])
              
              # Extract published date
              published_date = extract_published_date(vuln_data)
              
              # Get affected package names
              affected_names = []
              package_ecosystem = ""
              for affected in vuln_data.get('affected', []):
                  if affected.get('package'):
                      pkg = affected['package']
                      pkg_name = pkg.get('name', '').lower()
                      pkg_ecosystem = pkg.get('ecosystem', '').lower()
                      if pkg_name:
                          affected_names.append(pkg_name)
                      if pkg_ecosystem:
                          package_ecosystem = pkg_ecosystem
              
              # Combine all text for keyword searching
              search_text = f"{summary} {details} {' '.join(affected_names)}".lower()
              
              # Determine which feed this belongs to - DATABASES ONLY
              source = None
              
              # Check MySQL keywords
              if contains_keyword(search_text, TARGET_KEYWORDS["mysql"]):
                  source = "mysql"
              # Check PostgreSQL keywords  
              elif contains_keyword(search_text, TARGET_KEYWORDS["postgresql"]):
                  source = "postgresql"
              # Check Redis keywords
              elif contains_keyword(search_text, TARGET_KEYWORDS["redis"]):
                  source = "redis"
              
              # Only include if it matches one of our DATABASE categories
              if source:
                  normalized_entry = {
                      "id": vuln_id,
                      "title": summary or f"Vulnerability {vuln_id}",
                      "description": details or summary or "No description available",
                      "published_date": published_date.isoformat(),  # FIXED: Include published_date in JSON
                      "url": f"https://osv.dev/{vuln_id}",
                      "source": source,
                      "aliases": aliases,
                      "affected_packages": affected_names,
                      "ecosystem": package_ecosystem
                  }
                  
                  all_vulnerabilities.append(normalized_entry)
          
          all_vulnerabilities = []

          # Step 1: Download and process each ecosystem
          for ecosystem in ECOSYSTEMS:
              print(f"📥 Processing {ecosystem} ecosystem for DATABASE vulnerabilities...")
              
              url = f"{OSV_EXPORT_URL}/{ecosystem}/all.zip"
              
              try:
                  response = requests.get(url, timeout=120)
                  response.raise_for_status()
                  
                  # The response is a ZIP file containing individual JSON files
                  with zipfile.ZipFile(io.BytesIO(response.content)) as zip_file:
                      # Process each JSON file in the ZIP
                      for file_name in zip_file.namelist():
                          if file_name.endswith('.json'):
                              with zip_file.open(file_name) as json_file:
                                  try:
                                      vuln_data = json.load(json_file)
                                      process_vulnerability(vuln_data, all_vulnerabilities)
                                  except json.JSONDecodeError as e:
                                      continue
                  
                  current_matches = len([v for v in all_vulnerabilities])
                  print(f"✅ Processed {ecosystem} - found {current_matches} DATABASE matches so far")
                  
              except requests.RequestException as e:
                  print(f"⚠️ Failed to download {ecosystem}: {e}")
                  continue
              except zipfile.BadZipFile:
                  print(f"⚠️ Invalid ZIP file for {ecosystem}")
                  continue

          print(f"\n📊 DATABASE Processing complete:")
          print(f"   📝 Total DATABASE vulnerabilities: {len(all_vulnerabilities)}")
          
          # Step 2: Group by source and save to files
          if not os.path.exists("data"):
              os.makedirs("data")

          grouped_data = {}
          for entry in all_vulnerabilities:
              source = entry['source']
              if source not in grouped_data:
                  grouped_data[source] = []
              grouped_data[source].append(entry)

          # Print breakdown before saving
          print(f"\n📈 DATABASE Vulnerability Breakdown:")
          for source in sorted(grouped_data.keys()):
              print(f"   {source.upper()}: {len(grouped_data[source])} entries")

          # Only save database files
          database_files = ["mysql", "postgresql", "redis"]
          
          for db in database_files:
              if db not in grouped_data:
                  grouped_data[db] = []
              
              with open(f"data/{db}.json", "w") as f:
                  json.dump(grouped_data[db], f, indent=2)
              print(f"💾 Saved {len(grouped_data[db])} entries to data/{db}.json")
          
          # Print some examples for debugging with dates
          if all_vulnerabilities:
              print(f"\n🔍 Sample DATABASE vulnerabilities found:")
              for source in sorted(grouped_data.keys()):
                  if grouped_data[source]:
                      sample = grouped_data[source][0]
                      published_date = sample.get('published_date', 'Unknown')
                      print(f"   {source.upper()}: {sample['id']} - Published: {published_date[:10]} - {sample['title'][:50]}...")
          
          print("🎉 DATABASE vulnerability feed update completed!")
          EOF

      - name: 📊 Display Database Results
        run: |
          echo "=== Database Files Generated ==="
          ls -la data/mysql.json data/postgresql.json data/redis.json 2>/dev/null || echo "Some database files not found"
          echo ""
          echo "=== Database File Contents ==="
          for file in data/mysql.json data/postgresql.json data/redis.json; do
            if [ -f "$file" ]; then
              count=$(jq 'length' "$file" 2>/dev/null || echo "0")
              echo "$(basename "$file"): $count entries"
            fi
          done
          echo ""
          echo "=== Sample with Published Dates ==="
          for file in data/mysql.json data/postgresql.json data/redis.json; do
            if [ -f "$file" ]; then
              echo "$(basename "$file"):"
              jq -r '.[0] | "  ID: \(.id)\n  Published: \(.published_date)\n  Title: \(.title)\n"' "$file" 2>/dev/null || echo "  No entries or invalid JSON"
              echo ""
            fi
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Get the latest changes to avoid conflicts
          git fetch origin
          git reset --hard origin/main
          
          # Add only the specific database files we want to track
          git add data/mysql.json data/postgresql.json data/redis.json
          
          # Check if there are changes after adding
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to Database vulnerability data"
          else
            MYSQL_COUNT=$(jq '. | length' data/mysql.json)
            POSTGRES_COUNT=$(jq '. | length' data/postgresql.json)
            REDIS_COUNT=$(jq '. | length' data/redis.json)
            TOTAL_COUNT=$((MYSQL_COUNT + POSTGRES_COUNT + REDIS_COUNT))
            
            git commit -m "🔄 Update Database vulnerability feeds - $TOTAL_COUNT vulnerabilities (MySQL: $MYSQL_COUNT, PostgreSQL: $POSTGRES_COUNT, Redis: $REDIS_COUNT) - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Successfully pushed Database vulnerability data to repository"
          fi
