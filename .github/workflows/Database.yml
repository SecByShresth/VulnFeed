name: 🧠 VulnFeed - Database Vulnerabilities

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # Runs daily at 03:00 UTC

jobs:
  fetch-db-vulns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip requests

      - name: Fetch Database Vulnerabilities
        run: |
          python3 <<'EOF'
          import requests, json, os, time

          os.makedirs("data", exist_ok=True)
          products = {
              "mysql": ["mysql", "mariadb", "percona"],
              "postgresql": ["postgresql", "pgsql", "postgres"],
              "redis": ["redis"]
          }

          for product, terms in products.items():
              results = []
              print(f"=== Processing {product.upper()} ===")
              for term in terms:
                  print(f"🔍 Searching '{term}'...")
                  try:
                      response = requests.post(
                          "https://api.osv.dev/v1/query",
                          headers={"Content-Type": "application/json"},
                          json={"query": term}
                      )
                      response.raise_for_status()
                      data = response.json()

                      # Handle OSV response variations
                      if isinstance(data, dict) and "vulns" in data:
                          results.extend(data["vulns"])
                      elif isinstance(data, dict) and data.get("id"):
                          results.append(data)
                      else:
                          print(f"⚠️ No valid vulns found for {term}")

                  except Exception as e:
                      print(f"⚠️ Error fetching {term}: {e}")
                  time.sleep(1)  # be gentle with OSV API

              # Save only latest 100 (sorted by modified date if present)
              try:
                  results = sorted(
                      results,
                      key=lambda x: x.get("modified", x.get("published", "")),
                      reverse=True
                  )
              except Exception:
                  pass

              print(f"💾 Saved {len(results)} vulnerabilities to data/{product}.json")
              with open(f"data/{product}.json", "w") as f:
                  json.dump(results[:100], f, indent=2)

          print("🎉 Done fetching all database vulnerabilities!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff-index --quiet HEAD || git commit -m "🔄 Update DB VulnFeed data"
          git push
