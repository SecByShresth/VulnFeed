name: 🧠 VulnFeed - Database Vulnerabilities

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # Runs daily at 03:00 UTC

jobs:
  fetch-db-vulns:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip requests
          
      - name: Fetch Database Vulnerabilities
        run: |
          python3 <<'EOF'
          import requests
          import json
          import os
          import time
          from datetime import datetime, timezone, timedelta
          
          # Create data directory
          os.makedirs("data", exist_ok=True)
          
          # Database products - we'll search GitHub Security Advisories via OSV
          # and combine with package ecosystem queries
          products = {
              "mysql": {
                  "search_terms": ["mysql", "mariadb", "percona"],
                  "ecosystems": [
                      {"ecosystem": "PyPI", "name": "mysql-connector-python"},
                      {"ecosystem": "npm", "name": "mysql"},
                      {"ecosystem": "npm", "name": "mysql2"},
                      {"ecosystem": "Maven", "name": "mysql:mysql-connector-java"},
                      {"ecosystem": "Go", "name": "github.com/go-sql-driver/mysql"},
                  ]
              },
              "postgresql": {
                  "search_terms": ["postgresql", "postgres"],
                  "ecosystems": [
                      {"ecosystem": "PyPI", "name": "psycopg2"},
                      {"ecosystem": "PyPI", "name": "psycopg2-binary"},
                      {"ecosystem": "npm", "name": "pg"},
                      {"ecosystem": "Maven", "name": "org.postgresql:postgresql"},
                      {"ecosystem": "Go", "name": "github.com/lib/pq"},
                  ]
              },
              "redis": {
                  "search_terms": ["redis"],
                  "ecosystems": [
                      {"ecosystem": "PyPI", "name": "redis"},
                      {"ecosystem": "npm", "name": "redis"},
                      {"ecosystem": "Maven", "name": "redis.clients:jedis"},
                      {"ecosystem": "Go", "name": "github.com/go-redis/redis"},
                  ]
              }
          }
          
          # Current timestamp for metadata
          fetch_timestamp = datetime.now(timezone.utc).isoformat()
          
          def fetch_osv_vulnerabilities(product_name, config):
              """Fetch vulnerabilities from OSV.dev for database products"""
              all_vulns = []
              seen_ids = set()
              
              print(f"\n{'='*60}")
              print(f"📦 Processing: {product_name.upper()}")
              print(f"{'='*60}")
              
              # Fetch from package ecosystems
              for pkg in config["ecosystems"]:
                  ecosystem = pkg["ecosystem"]
                  name = pkg["name"]
                  print(f"\n🔍 Searching: {ecosystem}/{name}")
                  
                  try:
                      payload = {
                          "package": {
                              "ecosystem": ecosystem,
                              "name": name
                          }
                      }
                      
                      response = requests.post(
                          "https://api.osv.dev/v1/query",
                          headers={"Content-Type": "application/json"},
                          json=payload,
                          timeout=30
                      )
                      response.raise_for_status()
                      data = response.json()
                      
                      vulns = data.get("vulns", [])
                      
                      new_count = 0
                      for vuln in vulns:
                          vuln_id = vuln.get("id")
                          if vuln_id and vuln_id not in seen_ids:
                              seen_ids.add(vuln_id)
                              
                              # Add metadata WITHOUT modifying original dates
                              vuln["_metadata"] = {
                                  "fetched_at": fetch_timestamp,
                                  "source_package": f"{ecosystem}/{name}"
                              }
                              
                              all_vulns.append(vuln)
                              new_count += 1
                      
                      print(f"   ✓ Found {len(vulns)} vulnerabilities ({new_count} new)")
                      
                  except requests.exceptions.HTTPError as e:
                      print(f"   ✗ HTTP error: {e}")
                  except requests.exceptions.RequestException as e:
                      print(f"   ✗ Network error: {e}")
                  except Exception as e:
                      print(f"   ✗ Unexpected error: {e}")
                  
                  time.sleep(1)  # Rate limiting
              
              return all_vulns
          
          def filter_recent_vulnerabilities(vulns, months=12):
              """Filter vulnerabilities published in the last N months"""
              cutoff_date = datetime.now(timezone.utc) - timedelta(days=months * 30)
              recent_vulns = []
              
              for vuln in vulns:
                  pub_date = vuln.get("published")
                  if pub_date:
                      try:
                          vuln_date = datetime.fromisoformat(pub_date.replace('Z', '+00:00'))
                          if vuln_date >= cutoff_date:
                              recent_vulns.append(vuln)
                      except:
                          # If date parsing fails, include it anyway
                          recent_vulns.append(vuln)
                  else:
                      # If no published date, include it
                      recent_vulns.append(vuln)
              
              return recent_vulns
          
          def sort_by_published_date(vulns):
              """Sort vulnerabilities by published date (newest first)"""
              def get_sort_key(vuln):
                  date_str = vuln.get("published", vuln.get("modified", ""))
                  return date_str
              
              try:
                  return sorted(vulns, key=get_sort_key, reverse=True)
              except Exception as e:
                  print(f"   ⚠️ Sorting warning: {e}")
                  return vulns
          
          # Process each product
          for product_name, config in products.items():
              vulnerabilities = fetch_osv_vulnerabilities(product_name, config)
              
              print(f"\n📊 Total fetched: {len(vulnerabilities)} vulnerabilities")
              
              # Filter to last 12 months
              vulnerabilities = filter_recent_vulnerabilities(vulnerabilities, months=12)
              print(f"📅 Last 12 months: {len(vulnerabilities)} vulnerabilities")
              
              # Sort by published date (newest first)
              vulnerabilities = sort_by_published_date(vulnerabilities)
              
              # Limit to latest 100
              vulnerabilities = vulnerabilities[:100]
              
              # Save to file
              output_file = f"data/{product_name}.json"
              with open(output_file, "w", encoding="utf-8") as f:
                  json.dump(vulnerabilities, f, indent=2, ensure_ascii=False)
              
              print(f"\n💾 Saved {len(vulnerabilities)} vulnerabilities to {output_file}")
              
              # Show date range for verification
              if vulnerabilities:
                  first_date = vulnerabilities[0].get("published", "N/A")
                  last_date = vulnerabilities[-1].get("published", "N/A")
                  print(f"   📅 Date range: {first_date} → {last_date}")
              else:
                  print(f"   ⚠️ No recent vulnerabilities found for {product_name}")
          
          print(f"\n{'='*60}")
          print("🎉 Successfully fetched all database vulnerabilities!")
          print(f"{'='*60}\n")
          EOF
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "🔄 Update DB VulnFeed data - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Changes committed and pushed"
          else
            echo "✓ No changes detected - skipping commit"
          fi
