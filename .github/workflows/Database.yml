name: VulnFeed - OSV.dev Centralized Feed

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        # Need to fetch history to push later
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: 🌐 Fetch and Process Vulnerabilities from OSV.dev
        run: |
          python3 << 'EOF'
          import requests
          import json
          import csv
          import io
          import os
          
          print("🔍 Fetching daily modified vulnerability IDs from OSV.dev...")
          
          # 1. Configuration
          MODIFIED_IDS_URL = "https://storage.googleapis.com/osv-vulnerabilities/modified_id.csv"
          VULN_BASE_URL = "https://api.osv.dev/v1/vulns/"
          
          # Keywords to filter by title/description for your target feeds
          TARGET_KEYWORDS = {
              "mysql": ["mysql", "mariadb"],
              "postgresql": ["postgres", "postgresql"],
              "redis": ["redis"],
              "exploitdb": ["exploit-db", "edb"] 
          }
          
          all_vulnerabilities = []

          # 2. Download the modified IDs list
          try:
              response = requests.get(MODIFIED_IDS_URL)
              response.raise_for_status()
          except requests.RequestException as e:
              print(f"❌ Failed to download modified_id.csv: {e}")
              exit(1)
              
          # 3. Process the CSV file
          csv_data = io.StringIO(response.text)
          reader = csv.reader(csv_data)
          
          osv_ids_to_fetch = set()
          for row in reader:
              if row and row[0].strip().startswith(("GHSA", "CVE", "OSV")):
                  osv_ids_to_fetch.add(row[0].strip())

          count = 0
          for osv_id in osv_ids_to_fetch:
              
              # 4. Fetch the full OSV JSON for the ID
              try:
                  vuln_response = requests.get(f"{VULN_BASE_URL}{osv_id}")
                  vuln_response.raise_for_status()
                  vuln_data = vuln_response.json()
              except requests.RequestException:
                  continue 
              
              
              # 5. Determine the source and normalize the data
              source = "osv-general" 
              
              summary = vuln_data.get('summary', vuln_data.get('details', 'No summary available.'))
              details = vuln_data.get('details', '')
              
              # Check keywords for specific DBs
              for db_source, keywords in TARGET_KEYWORDS.items():
                  # Check for EDB alias
                  if db_source == "exploitdb":
                      if any(alias.upper().startswith('EDB-ID') for alias in vuln_data.get('aliases', [])):
                          source = db_source
                          break
                  
                  # Check summary/details and affected package names
                  affected_names = [p['package']['name'].lower() for a in vuln_data.get('affected', []) if a.get('package')]
                  
                  search_text = (summary + details).lower()
                  
                  if any(k in search_text for k in keywords) or any(k in affected_names for k in keywords):
                      source = db_source
                      break 
              
              # Normalize the entry format
              normalized_entry = {
                  "id": osv_id,
                  "title": vuln_data.get('summary', osv_id),
                  "description": summary,
                  "url": f"https://osv.dev/{osv_id}",
                  "source": source
              }
              
              all_vulnerabilities.append(normalized_entry)
              count += 1
              
          # 6. Save the consolidated, filtered data into separate JSON files
          if not os.path.exists("data"):
              os.makedirs("data")

          # Group by the detected source
          grouped_data = {}
          for entry in all_vulnerabilities:
              db_name = entry['source'].split('-')[0]
              if db_name not in grouped_data:
                  grouped_data[db_name] = []
              grouped_data[db_name].append(entry)

          for db, data in grouped_data.items():
              with open(f"data/{db}.json", "w") as f:
                  json.dump(data, f, indent=2)

          # Ensure the four main target files exist, even if empty, for consistency
          for db in ["mysql", "postgresql", "redis", "exploitdb"]:
              if db not in grouped_data:
                  with open(f"data/{db}.json", "w") as f:
                      json.dump([], f, indent=2)
                      
          print(f"✅ Fetched and processed {count} modified OSV records.")
          for db, data in grouped_data.items():
              print(f"   -> Saved {len(data)} entries for {db.upper()} to data/{db}.json")
              
          EOF

      - name: Commit and Push Changes (Standard Git CLI)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/*.json
          
          # Check if there are any changes to commit before trying to commit
          if git status --porcelain | grep -q data/; then
              git commit -m "Auto-update feeds from OSV.dev"
              git push
          else
              echo "No changes in data files to commit."
          fi
