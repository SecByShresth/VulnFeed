name: VulnFeed - OSV.dev Centralized Feed

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: 🌐 Fetch and Process Vulnerabilities from OSV.dev
        run: |
          python3 << 'EOF'
          import requests
          import json
          import csv
          import io
          import os
          import time
          
          print("🚀 Starting OSV.dev vulnerability feed update...")
          
          # Configuration
          MODIFIED_IDS_URL = "https://storage.googleapis.com/osv-vulnerabilities/modified_id.csv"
          VULN_BASE_URL = "https://api.osv.dev/v1/vulns/"
          
          # Enhanced keyword matching
          TARGET_KEYWORDS = {
              "mysql": ["mysql", "mariadb", "percona"],
              "postgresql": ["postgres", "postgresql", "pgsql"],
              "redis": ["redis"],
              "exploitdb": ["exploit", "edb-id", "exploit-db"] 
          }
          
          all_vulnerabilities = []

          # Step 1: Download the modified IDs list
          print("📥 Downloading modified_id.csv...")
          try:
              response = requests.get(MODIFIED_IDS_URL, timeout=30)
              response.raise_for_status()
              print(f"✅ Downloaded modified_id.csv ({len(response.text)} bytes)")
          except requests.RequestException as e:
              print(f"❌ Failed to download modified_id.csv: {e}")
              exit(1)
              
          # Step 2: Process CSV and extract OSV IDs
          csv_data = io.StringIO(response.text)
          reader = csv.reader(csv_data)
          
          osv_ids_to_fetch = []
          for row in reader:
              if row and row[0].strip():
                  osv_id = row[0].strip()
                  # Include all types of vulnerabilities
                  osv_ids_to_fetch.append(osv_id)
          
          print(f"📋 Found {len(osv_ids_to_fetch)} IDs to process")
          
          # Step 3: Fetch details for each vulnerability
          session = requests.Session()
          fetched_count = 0
          error_count = 0
          
          for i, osv_id in enumerate(osv_ids_to_fetch):
              if i % 50 == 0:
                  print(f"⏳ Progress: {i}/{len(osv_ids_to_fetch)}...")
              
              try:
                  # Add small delay to be respectful to the API
                  time.sleep(0.1)
                  
                  vuln_response = session.get(f"{VULN_BASE_URL}{osv_id}", timeout=30)
                  vuln_response.raise_for_status()
                  vuln_data = vuln_response.json()
                  
                  # Extract relevant information
                  summary = vuln_data.get('summary', '')
                  details = vuln_data.get('details', '')
                  aliases = vuln_data.get('aliases', [])
                  
                  # Get affected package names
                  affected_names = []
                  for affected in vuln_data.get('affected', []):
                      if affected.get('package'):
                          pkg_name = affected['package'].get('name', '').lower()
                          if pkg_name:
                              affected_names.append(pkg_name)
                  
                  # Combine all text for keyword searching
                  search_text = f"{summary} {details} {' '.join(affected_names)}".lower()
                  
                  # Determine which feed this belongs to
                  source = "osv-general"
                  
                  # Check for ExploitDB first (via aliases)
                  if any(alias.upper().startswith('EDB-') for alias in aliases):
                      source = "exploitdb"
                  # Check MySQL keywords
                  elif any(keyword in search_text for keyword in TARGET_KEYWORDS["mysql"]):
                      source = "mysql"
                  # Check PostgreSQL keywords  
                  elif any(keyword in search_text for keyword in TARGET_KEYWORDS["postgresql"]):
                      source = "postgresql"
                  # Check Redis keywords
                  elif any(keyword in search_text for keyword in TARGET_KEYWORDS["redis"]):
                      source = "redis"
                  # Check ExploitDB in text as fallback
                  elif any(keyword in search_text for keyword in TARGET_KEYWORDS["exploitdb"]):
                      source = "exploitdb"
                  
                  # Only include if it matches one of our target categories
                  if source != "osv-general":
                      normalized_entry = {
                          "id": osv_id,
                          "title": summary or f"Vulnerability {osv_id}",
                          "description": details or summary or "No description available",
                          "url": f"https://osv.dev/{osv_id}",
                          "source": source,
                          "aliases": aliases,
                          "affected_packages": affected_names
                      }
                      
                      all_vulnerabilities.append(normalized_entry)
                      fetched_count += 1
                  
              except requests.RequestException as e:
                  print(f"⚠️ Failed to fetch {osv_id}: {e}")
                  error_count += 1
                  continue
              except json.JSONDecodeError as e:
                  print(f"⚠️ Failed to parse JSON for {osv_id}: {e}")
                  error_count += 1
                  continue

          print(f"\n📊 Processing complete:")
          print(f"   ✅ Successfully processed: {fetched_count}")
          print(f"   ❌ Errors encountered: {error_count}")
          print(f"   📝 Total matching vulnerabilities: {len(all_vulnerabilities)}")
          
          # Step 4: Group by source and save to files
          if not os.path.exists("data"):
              os.makedirs("data")

          grouped_data = {}
          for entry in all_vulnerabilities:
              source = entry['source']
              if source not in grouped_data:
                  grouped_data[source] = []
              grouped_data[source].append(entry)

          # Ensure all target files exist (even if empty)
          for db in ["mysql", "postgresql", "redis", "exploitdb"]:
              if db not in grouped_data:
                  grouped_data[db] = []
              
              with open(f"data/{db}.json", "w") as f:
                  json.dump(grouped_data[db], f, indent=2)
              print(f"💾 Saved {len(grouped_data[db])} entries to data/{db}.json")
          
          # Print some examples for debugging
          if all_vulnerabilities:
              print(f"\n🔍 Sample vulnerabilities found:")
              for source in grouped_data:
                  if grouped_data[source]:
                      sample = grouped_data[source][0]
                      print(f"   {source.upper()}: {sample['id']} - {sample['title'][:60]}...")
          
          print("🎉 Vulnerability feed update completed!")
          EOF

      - name: 📊 Display Results
        run: |
          echo "=== Generated Files ==="
          ls -la data/ || echo "No data directory found"
          echo ""
          echo "=== File Contents ==="
          for file in data/*.json 2>/dev/null; do
            if [ -f "$file" ]; then
              count=$(jq length "$file" 2>/dev/null || echo "0")
              echo "$(basename $file): $count entries"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/*.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: OSV.dev vulnerability feeds $(date +'%Y-%m-%d')"
            git push
            echo "Changes committed and pushed."
          fi
