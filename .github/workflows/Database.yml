name: VulnFeed - OSV.dev Centralized Feed

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: 🌐 Fetch and Process Vulnerabilities from OSV.dev
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          import gzip
          import io
          
          print("🚀 Starting OSV.dev vulnerability feed update...")
          
          # Configuration - Using OSV export endpoints
          OSV_EXPORT_URL = "https://osv-vulnerabilities.storage.googleapis.com"
          ECOSYSTEMS = ["Go", "PyPI", "npm", "Maven", "NuGet", "RubyGems", "Packagist", "Crates.io"]
          
          # Enhanced keyword matching
          TARGET_KEYWORDS = {
              "mysql": ["mysql", "mariadb", "percona"],
              "postgresql": ["postgres", "postgresql", "pgsql"],
              "redis": ["redis", "redis-server"],
              "exploitdb": ["exploit", "edb-id"] 
          }
          
          all_vulnerabilities = []

          # Step 1: Download and process each ecosystem
          for ecosystem in ECOSYSTEMS:
              print(f"📥 Processing {ecosystem} ecosystem...")
              
              url = f"{OSV_EXPORT_URL}/{ecosystem}/all.zip"
              
              try:
                  response = requests.get(url, timeout=60)
                  response.raise_for_status()
                  
                  # The response is actually a gzipped file with one JSON per line
                  with gzip.open(io.BytesIO(response.content), 'rt', encoding='utf-8') as f:
                      for line in f:
                          if line.strip():
                              try:
                                  vuln_data = json.loads(line)
                                  process_vulnerability(vuln_data, all_vulnerabilities)
                              except json.JSONDecodeError:
                                  continue
                  
                  print(f"✅ Processed {ecosystem}")
                  
              except requests.RequestException as e:
                  print(f"⚠️ Failed to download {ecosystem}: {e}")
                  continue

          print(f"\n📊 Processing complete:")
          print(f"   📝 Total matching vulnerabilities: {len(all_vulnerabilities)}")
          
          # Step 2: Group by source and save to files
          if not os.path.exists("data"):
              os.makedirs("data")

          grouped_data = {}
          for entry in all_vulnerabilities:
              source = entry['source']
              if source not in grouped_data:
                  grouped_data[source] = []
              grouped_data[source].append(entry)

          # Ensure all target files exist (even if empty)
          for db in ["mysql", "postgresql", "redis", "exploitdb"]:
              if db not in grouped_data:
                  grouped_data[db] = []
              
              with open(f"data/{db}.json", "w") as f:
                  json.dump(grouped_data[db], f, indent=2)
              print(f"💾 Saved {len(grouped_data[db])} entries to data/{db}.json")
          
          # Print some examples for debugging
          if all_vulnerabilities:
              print(f"\n🔍 Sample vulnerabilities found:")
              for source in grouped_data:
                  if grouped_data[source]:
                      sample = grouped_data[source][0]
                      print(f"   {source.upper()}: {sample['id']} - {sample['title'][:60]}...")
          
          print("🎉 Vulnerability feed update completed!")

          def process_vulnerability(vuln_data, all_vulnerabilities):
              """Process a single vulnerability and add to results if it matches our criteria"""
              
              vuln_id = vuln_data.get('id', '')
              summary = vuln_data.get('summary', '')
              details = vuln_data.get('details', '')
              aliases = vuln_data.get('aliases', [])
              
              # Get affected package names
              affected_names = []
              for affected in vuln_data.get('affected', []):
                  if affected.get('package'):
                      pkg_name = affected['package'].get('name', '').lower()
                      if pkg_name:
                          affected_names.append(pkg_name)
              
              # Combine all text for keyword searching
              search_text = f"{summary} {details} {' '.join(affected_names)}".lower()
              
              # Determine which feed this belongs to
              source = None
              
              # Check for ExploitDB first (via aliases)
              if any('edb-' in alias.lower() for alias in aliases):
                  source = "exploitdb"
              # Check MySQL keywords
              elif any(keyword in search_text for keyword in TARGET_KEYWORDS["mysql"]):
                  source = "mysql"
              # Check PostgreSQL keywords  
              elif any(keyword in search_text for keyword in TARGET_KEYWORDS["postgresql"]):
                  source = "postgresql"
              # Check Redis keywords
              elif any(keyword in search_text for keyword in TARGET_KEYWORDS["redis"]):
                  source = "redis"
              # Check ExploitDB in text as fallback
              elif any(keyword in search_text for keyword in TARGET_KEYWORDS["exploitdb"]):
                  source = "exploitdb"
              
              # Only include if it matches one of our target categories
              if source:
                  normalized_entry = {
                      "id": vuln_id,
                      "title": summary or f"Vulnerability {vuln_id}",
                      "description": details or summary or "No description available",
                      "url": f"https://osv.dev/{vuln_id}",
                      "source": source,
                      "aliases": aliases,
                      "affected_packages": affected_names
                  }
                  
                  all_vulnerabilities.append(normalized_entry)
          EOF

      - name: 📊 Display Results
        run: |
          echo "=== Generated Files ==="
          ls -la data/ || echo "No data directory found"
          echo ""
          echo "=== File Contents ==="
          for file in data/*.json 2>/dev/null; do
            if [ -f "$file" ]; then
              count=$(jq length "$file" 2>/dev/null || echo "0")
              echo "$(basename $file): $count entries"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/*.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: OSV.dev vulnerability feeds $(date +'%Y-%m-%d')"
            git push
            echo "Changes committed and pushed."
          fi
