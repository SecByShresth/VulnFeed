name: LinuxFeed

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: 🌐 Fetch and Process Vulnerabilities from OSV.dev
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          import zipfile
          import io
          import re
          
          print("🚀 Starting OSV.dev vulnerability feed update...")
          
          # Configuration - Using OSV export endpoints
          OSV_EXPORT_URL = "https://osv-vulnerabilities.storage.googleapis.com"
          
          # Focus on ecosystems most likely to have DB-related vulnerabilities
          ECOSYSTEMS = ["Go", "PyPI", "npm", "Maven", "NuGet", "RubyGems", "Packagist", "crates.io"]
          
          # Enhanced keyword matching with word boundaries for Linux distributions
          TARGET_KEYWORDS = {
              "mysql": ["mysql", "mariadb", "percona"],
              "postgresql": ["postgres", "postgresql", "pgsql"],
              "redis": ["redis"],
              "almalinux": ["almalinux", "alma linux"],
              "rockylinux": ["rockylinux", "rocky linux"],
              "amazonlinux": ["amazonlinux", "amazon linux"],
              "archlinux": ["archlinux", "arch linux"],
              "canonical": ["canonical", "ubuntu"],
              "debian": ["debian"],
              "ubuntu": ["ubuntu"],
              "fedora": ["fedora"],
              "oraclelinux": ["oraclelinux", "oracle linux"],
              "suse": ["suse", "sles", "opensuse", "openSUSE", "suse linux"]
          }
          
          def contains_keyword(text, keywords):
              """Check if text contains any of the keywords with word boundaries"""
              if not text or not keywords:
                  return False
              text_lower = text.lower()
              for keyword in keywords:
                  # Use word boundaries to avoid partial matches
                  if re.search(r'\b' + re.escape(keyword) + r'\b', text_lower):
                      return True
              return False
          
          def process_vulnerability(vuln_data, all_vulnerabilities):
              """Process a single vulnerability and add to results if it matches our criteria"""
              
              vuln_id = vuln_data.get('id', '')
              summary = vuln_data.get('summary', '')
              details = vuln_data.get('details', '')
              aliases = vuln_data.get('aliases', [])
              
              # Get affected package names
              affected_names = []
              package_ecosystem = ""
              for affected in vuln_data.get('affected', []):
                  if affected.get('package'):
                      pkg = affected['package']
                      pkg_name = pkg.get('name', '').lower()
                      pkg_ecosystem = pkg.get('ecosystem', '').lower()
                      if pkg_name:
                          affected_names.append(pkg_name)
                      if pkg_ecosystem:
                          package_ecosystem = pkg_ecosystem
              
              # Combine all text for keyword searching
              search_text = f"{summary} {details} {' '.join(affected_names)}".lower()
              
              # Determine which feed this belongs to
              source = None
              
              # Check database keywords first
              if contains_keyword(search_text, TARGET_KEYWORDS["mysql"]):
                  source = "mysql"
              elif contains_keyword(search_text, TARGET_KEYWORDS["postgresql"]):
                  source = "postgresql"
              elif contains_keyword(search_text, TARGET_KEYWORDS["redis"]):
                  source = "redis"
              # Check Linux distributions
              elif contains_keyword(search_text, TARGET_KEYWORDS["almalinux"]):
                  source = "almalinux"
              elif contains_keyword(search_text, TARGET_KEYWORDS["rockylinux"]):
                  source = "rockylinux"
              elif contains_keyword(search_text, TARGET_KEYWORDS["amazonlinux"]):
                  source = "amazonlinux"
              elif contains_keyword(search_text, TARGET_KEYWORDS["archlinux"]):
                  source = "archlinux"
              elif contains_keyword(search_text, TARGET_KEYWORDS["canonical"]):
                  source = "canonical"
              elif contains_keyword(search_text, TARGET_KEYWORDS["debian"]):
                  source = "debian"
              elif contains_keyword(search_text, TARGET_KEYWORDS["ubuntu"]):
                  source = "ubuntu"
              elif contains_keyword(search_text, TARGET_KEYWORDS["fedora"]):
                  source = "fedora"
              elif contains_keyword(search_text, TARGET_KEYWORDS["oraclelinux"]):
                  source = "oraclelinux"
              elif contains_keyword(search_text, TARGET_KEYWORDS["suse"]):
                  source = "suse"
              
              # Only include if it matches one of our target categories
              if source:
                  normalized_entry = {
                      "id": vuln_id,
                      "title": summary or f"Vulnerability {vuln_id}",
                      "description": details or summary or "No description available",
                      "url": f"https://osv.dev/{vuln_id}",
                      "source": source,
                      "aliases": aliases,
                      "affected_packages": affected_names,
                      "ecosystem": package_ecosystem
                  }
                  
                  all_vulnerabilities.append(normalized_entry)
          
          all_vulnerabilities = []

          # Step 1: Download and process each ecosystem
          for ecosystem in ECOSYSTEMS:
              print(f"📥 Processing {ecosystem} ecosystem...")
              
              url = f"{OSV_EXPORT_URL}/{ecosystem}/all.zip"
              
              try:
                  response = requests.get(url, timeout=120)
                  response.raise_for_status()
                  
                  # The response is a ZIP file containing individual JSON files
                  with zipfile.ZipFile(io.BytesIO(response.content)) as zip_file:
                      # Process each JSON file in the ZIP
                      for file_name in zip_file.namelist():
                          if file_name.endswith('.json'):
                              with zip_file.open(file_name) as json_file:
                                  try:
                                      vuln_data = json.load(json_file)
                                      process_vulnerability(vuln_data, all_vulnerabilities)
                                  except json.JSONDecodeError as e:
                                      continue
                  
                  current_matches = len([v for v in all_vulnerabilities])
                  print(f"✅ Processed {ecosystem} - found {current_matches} total matches so far")
                  
              except requests.RequestException as e:
                  print(f"⚠️ Failed to download {ecosystem}: {e}")
                  continue
              except zipfile.BadZipFile:
                  print(f"⚠️ Invalid ZIP file for {ecosystem}")
                  continue

          print(f"\n📊 Processing complete:")
          print(f"   📝 Total matching vulnerabilities: {len(all_vulnerabilities)}")
          
          # Step 2: Group by source and save to files
          if not os.path.exists("data"):
              os.makedirs("data")

          grouped_data = {}
          for entry in all_vulnerabilities:
              source = entry['source']
              if source not in grouped_data:
                  grouped_data[source] = []
              grouped_data[source].append(entry)

          # Print breakdown before saving
          print(f"\n📈 Vulnerability Breakdown:")
          for source in sorted(grouped_data.keys()):
              print(f"   {source.upper()}: {len(grouped_data[source])} entries")

          # Ensure all target files exist (even if empty)
          target_files = [
              "mysql", "postgresql", "redis", 
              "almalinux", "rockylinux", "amazonlinux", "archlinux",
              "canonical", "debian", "ubuntu", "fedora", 
              "oraclelinux", "suse"
          ]
          
          for db in target_files:
              if db not in grouped_data:
                  grouped_data[db] = []
              
              with open(f"data/{db}.json", "w") as f:
                  json.dump(grouped_data[db], f, indent=2)
              print(f"💾 Saved {len(grouped_data[db])} entries to data/{db}.json")
          
          # Print some examples for debugging
          if all_vulnerabilities:
              print(f"\n🔍 Sample vulnerabilities found:")
              for source in sorted(grouped_data.keys()):
                  if grouped_data[source]:
                      sample = grouped_data[source][0]
                      print(f"   {source.upper()}: {sample['id']} - {sample['title'][:60]}...")
          
          print("🎉 Vulnerability feed update completed!")
          EOF

      - name: 📊 Display Results
        run: |
          echo "=== Generated Files ==="
          ls -la data/ || echo "No data directory found"
          echo ""
          echo "=== File Contents ==="
          for file in data/*.json; do
            if [ -f "$file" ]; then
              count=$(jq 'length' "$file" 2>/dev/null || echo "0")
              echo "$(basename "$file"): $count entries"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes and rebase before committing
          git pull --rebase origin main
          
          git add data/*.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: OSV.dev vulnerability feeds $(date +'%Y-%m-%d')"
            git push
            echo "Changes committed and pushed."
          fi
