name: Fetch CVEs Daily

on:
  schedule:
    - cron: '0 2 * * *'  # runs daily at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-cves:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # fetch all history for rebase

      - name: Fetch CVE data from NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p data
          START_DATE=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%S.000')
          echo "Fetching CVEs since $START_DATE"

          HTTP_CODE=$(curl -w "%{http_code}" -H "apiKey: $NVD_API_KEY" \
            "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=2000&pubStartDate=${START_DATE}" \
            -o data/cves.json)

          echo "HTTP Response Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: API request failed with HTTP code $HTTP_CODE"
            cat data/cves.json
            exit 1
          fi

          if [ ! -s data/cves.json ]; then
            echo "Error: Downloaded file is empty"
            exit 1
          fi

          echo "Successfully fetched CVE data"
          echo "File size: $(wc -c < data/cves.json) bytes"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Ensure we’re fully up to date before committing
          git fetch origin main
          git rebase origin/main || git rebase --abort

          git add data/cves.json

          if git diff --staged --quiet; then
            echo "No new CVEs to commit"
          else
            git commit -m "Update CVE data - $(date -u)"
            git push origin main
            echo "Successfully pushed CVE data"
          fi
