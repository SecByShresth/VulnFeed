name: Fetch CVEs Daily

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write  # ← Add this line!

jobs:
  fetch-cves:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ← Add this too!
        
      - name: Fetch CVE data from NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p data
          
          # Calculate date 30 days ago
          START_DATE=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%S.000')
          
          # Fetch CVEs from NVD API
          curl -H "apiKey: $NVD_API_KEY" \
               "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=2000&pubStartDate=${START_DATE}" \
               -o data/cves.json
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/cves.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update CVE data - $(date)"
          git push
```

**Key changes:**
- Added `permissions: contents: write` at the top level
- Added `token: ${{ secrets.GITHUB_TOKEN }}` to the checkout step

---

## 🔄 After Making Changes

1. **If you used Option 1**: Just re-run the workflow
   - Go to **Actions** tab
   - Click **"Fetch CVEs Daily"**
   - Click **"Re-run jobs"** → **"Re-run failed jobs"**

2. **If you used Option 2**: Commit the updated workflow file, then run it again

