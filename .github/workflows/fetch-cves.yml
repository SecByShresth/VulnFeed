name: Fetch CVEs Daily

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-cves:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # fetch full history for rebase

      - name: Fetch CVE data from NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p data

          START_DATE=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%S.000Z')
          END_DATE=$(date -u '+%Y-%m-%dT%H:%M:%S.000Z')
          echo "Fetching CVEs from $START_DATE to $END_DATE"

          RETRIES=3
          SUCCESS=false

          for ((i=1; i<=RETRIES; i++)); do
            echo "Attempt $i of $RETRIES..."
            HTTP_CODE=$(curl -s -w "%{http_code}" -H "apiKey: $NVD_API_KEY" \
              "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=2000&pubStartDate=${START_DATE}&pubEndDate=${END_DATE}" \
              -o data/cves.json)

            echo "HTTP Response Code: $HTTP_CODE"

            if [ "$HTTP_CODE" -eq 200 ] && [ -s data/cves.json ]; then
              echo "✅ Successfully fetched CVE data"
              SUCCESS=true
              break
            else
              echo "⚠️ Fetch failed (HTTP $HTTP_CODE). Retrying in 15 seconds..."
              sleep 15
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Failed to fetch CVE data after $RETRIES attempts"
            exit 1
          fi

          echo "File size: $(wc -c < data/cves.json) bytes"

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git fetch origin main
          git checkout main
          git pull --rebase origin main

          git add data/cves.json
          if git diff --staged --quiet; then
            echo "ℹ️ No new CVEs to commit"
          else
            git commit -m "Update CVE data - $(date -u)"
            git push origin main || (git pull --rebase origin main && git push origin main)
            echo "✅ Successfully pushed updated CVE data"
          fi
