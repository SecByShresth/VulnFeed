<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnFeed — Vulnerability Intelligence Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    :root {
      --bg: #f5f6fa;
      --fg: #1e1e1e;
      --card-bg: #ffffff;
      --shadow-light: rgba(255,255,255,0.6);
      --shadow-dark: rgba(0,0,0,0.1);
    }
    [data-theme="dark"] {
      --bg: #1b1e23;
      --fg: #e6e6e6;
      --card-bg: #23272f;
      --shadow-light: rgba(255,255,255,0.05);
      --shadow-dark: rgba(0,0,0,0.6);
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: all 0.3s ease;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--card-bg);
      box-shadow: 4px 4px 8px var(--shadow-dark),
                  -4px -4px 8px var(--shadow-light);
      border-radius: 0 0 1rem 1rem;
    }

    h1 {
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .theme-toggle {
      cursor: pointer;
      font-size: 1.2rem;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 1rem;
    }

    .tab {
      background: var(--card-bg);
      padding: 0.6rem 1.2rem;
      border-radius: 1rem;
      box-shadow: 3px 3px 6px var(--shadow-dark),
                  -3px -3px 6px var(--shadow-light);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: var(--fg);
      color: var(--bg);
      font-weight: 600;
    }

    .content {
      flex: 1;
      padding: 1rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 4px 4px 10px var(--shadow-dark),
                  -4px -4px 10px var(--shadow-light);
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card h3 {
      margin: 0 0 0.4rem 0;
      font-size: 1rem;
    }

    .card p {
      margin: 0.2rem 0;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .card small {
      opacity: 0.6;
    }

    .feed-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .feed-stats {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .search-bar {
      text-align: center;
      margin: 1rem;
    }

    .search-bar input {
      width: 60%;
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      border: none;
      background: var(--card-bg);
      box-shadow: inset 2px 2px 6px var(--shadow-dark),
                  inset -2px -2px 6px var(--shadow-light);
      color: var(--fg);
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1>🛡️ VulnFeed</h1>
    <div class="theme-toggle" id="themeToggle">🌙</div>
  </header>

  <nav id="tabs"></nav>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search vulnerabilities...">
  </div>
  <main class="content" id="content"></main>

  <footer>© 2025 VulnFeed — Open Vulnerability Intelligence Dashboard</footer>

  <script>
    const feeds = [
      "mysql", "postgresql", "redis", "redhat-cves",
      "cisa-kev", "almalinux", "debian", "rocky",
      "suse", "ubuntu"
    ];
    const tabs = document.getElementById("tabs");
    const content = document.getElementById("content");
    const searchInput = document.getElementById("searchInput");
    const themeToggle = document.getElementById("themeToggle");

    let currentTab = "dashboard";
    let cachedData = {};

    // Theme toggle
    themeToggle.onclick = () => {
      const body = document.body;
      const isLight = body.getAttribute("data-theme") === "light";
      body.setAttribute("data-theme", isLight ? "dark" : "light");
      themeToggle.textContent = isLight ? "☀️" : "🌙";
    };

    // Build tabs
    function buildTabs() {
      tabs.innerHTML = `<div class="tab active" data-feed="dashboard">Dashboard</div>`;
      feeds.forEach(feed => {
        tabs.innerHTML += `<div class="tab" data-feed="${feed}">${feed.toUpperCase()}</div>`;
      });
      tabs.addEventListener("click", e => {
        if (e.target.classList.contains("tab")) {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          e.target.classList.add("active");
          currentTab = e.target.dataset.feed;
          renderContent();
        }
      });
    }

    async function fetchFeed(feed) {
      if (cachedData[feed]) return cachedData[feed];
      try {
        const res = await fetch(`data/${feed}.json`);
        if (!res.ok) throw new Error("Fetch error");
        const json = await res.json();
        cachedData[feed] = json;
        return json;
      } catch (err) {
        console.warn(`Failed to load ${feed}:`, err);
        return [];
      }
    }

    async function renderDashboard() {
      content.innerHTML = "";
      for (const feed of feeds) {
        const data = await fetchFeed(feed);
        const lastUpdated = new Date().toLocaleDateString();
        const total = Array.isArray(data) ? data.length : Object.keys(data || {}).length;
        const card = document.createElement("div");
        card.className = "card feed-card";
        card.innerHTML = `
          <h3>${feed.toUpperCase()}</h3>
          <div class="feed-stats">Total: ${total || 0}</div>
          <small>Last updated: ${lastUpdated}</small>
        `;
        card.onclick = () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelector(`[data-feed="${feed}"]`).classList.add("active");
          currentTab = feed;
          renderContent();
        };
        content.appendChild(card);
      }
    }

    async function renderFeed(feed) {
      const data = await fetchFeed(feed);
      const query = searchInput.value.toLowerCase();
      content.innerHTML = "";
      if (!data || (Array.isArray(data) && data.length === 0)) {
        content.innerHTML = `<div>No data available for ${feed.toUpperCase()}.</div>`;
        return;
      }
      const items = Array.isArray(data) ? data : Object.values(data);
      items
        .filter(item => !query || JSON.stringify(item).toLowerCase().includes(query))
        .slice(0, 100) // limit
        .forEach(vuln => {
          const cve = vuln.id || vuln.cve_id || vuln.CVE || "Unknown CVE";
          const desc = vuln.description || vuln.summary || "No description available.";
          const severity = vuln.severity || vuln.cvss?.baseSeverity || "N/A";
          const date = vuln.date || vuln.published || vuln.updated || "Unknown";
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <h3>${cve}</h3>
            <p><strong>Severity:</strong> ${severity}</p>
            <p>${desc}</p>
            <small>${date}</small>
          `;
          content.appendChild(card);
        });
    }

    async function renderContent() {
      if (currentTab === "dashboard") {
        renderDashboard();
      } else {
        renderFeed(currentTab);
      }
    }

    searchInput.addEventListener("input", () => {
      if (currentTab !== "dashboard") renderFeed(currentTab);
    });

    buildTabs();
    renderContent();
  </script>
</body>
</html>
