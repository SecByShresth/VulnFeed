<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerability Feed Aggregator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #475569;
            --critical: #dc2626;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a2332 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .source-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .last-updated {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .filters-panel {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 180px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .results-count {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .sort-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .sort-btn:hover {
            border-color: var(--accent);
            background: var(--bg-card);
        }

        .sort-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .cve-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .cve-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px var(--shadow);
            border-color: var(--accent);
        }

        .cve-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
        }

        .cve-id {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .cve-id:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-exploited { background: #8b5cf6; color: white; }
        .badge-ransomware { background: #ec4899; color: white; }

        .cve-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .cve-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .meta-label {
            font-weight: 600;
        }

        .action-required {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--critical);
            padding: 12px;
            margin-top: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .action-required strong {
            color: var(--critical);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid var(--critical);
            color: var(--critical);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ CISA Known Exploited Vulnerabilities</h1>
            <p class="subtitle">Actively exploited vulnerabilities tracked by CISA</p>
            <span class="source-badge">🚨 EXPLOITED IN THE WILD</span>
            <p class="last-updated" id="lastUpdated">Loading data...</p>
        </header>

        <div class="filters-panel">
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="vendor">Vendor/Product</label>
                    <input type="text" id="vendor" placeholder="e.g., Microsoft, Cisco, Apache">
                </div>

                <div class="filter-group">
                    <label for="ransomware">Ransomware Filter</label>
                    <select id="ransomware">
                        <option value="all">All Vulnerabilities</option>
                        <option value="known">Known Ransomware Use</option>
                        <option value="unknown">No Ransomware (Yet)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="timeRange">Time Range</label>
                    <select id="timeRange">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                        <option value="all">All Time</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="statsBar" class="stats-bar" style="display: none;"></div>

        <div class="results-header" id="resultsHeader" style="display: none;">
            <div class="results-count" id="resultsCount">0 results</div>
            <div class="sort-controls">
                <span style="color: var(--text-secondary); margin-right: 10px;">Sort by:</span>
                <button class="sort-btn active" data-sort="date">Date Added</button>
                <button class="sort-btn" data-sort="vendor">Vendor</button>
                <button class="sort-btn" data-sort="duedate">Due Date</button>
            </div>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        let allCves = [];
        let rawData = [];
        let currentSort = 'date';

        const elements = {
            vendorInput: document.getElementById('vendor'),
            ransomwareSelect: document.getElementById('ransomware'),
            timeRangeSelect: document.getElementById('timeRange'),
            resultsContainer: document.getElementById('resultsContainer'),
            statsBar: document.getElementById('statsBar'),
            resultsHeader: document.getElementById('resultsHeader'),
            resultsCount: document.getElementById('resultsCount'),
            lastUpdated: document.getElementById('lastUpdated')
        };

        // Event Listeners
        elements.vendorInput.addEventListener('input', applyFilters);
        elements.ransomwareSelect.addEventListener('change', applyFilters);
        elements.timeRangeSelect.addEventListener('change', applyFilters);

        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentSort = this.dataset.sort;
                renderResults(allCves);
            });
        });

        // Load data on page load
        window.addEventListener('load', loadCISAData);

        async function loadCISAData() {
            showLoading();
            
            try {
                const response = await fetch('data/cisa-kev.json');
                
                if (!response.ok) {
                    throw new Error(`Failed to load CISA data: ${response.status}. Make sure GitHub Actions has run at least once.`);
                }

                const data = await response.json();
                
                if (!data.vulnerabilities || data.vulnerabilities.length === 0) {
                    showError('No CISA vulnerability data available.');
                    return;
                }

                rawData = data.vulnerabilities.map(v => ({
                    id: v.cveID,
                    description: v.shortDescription || v.vulnerabilityName,
                    publishedDate: new Date(v.dateAdded),
                    vendors: v.vendorProject,
                    product: v.product,
                    url: `https://nvd.nist.gov/vuln/detail/${v.cveID}`,
                    exploited: true,
                    ransomware: v.knownRansomwareCampaignUse === 'Known',
                    dueDate: new Date(v.dueDate),
                    action: v.requiredAction,
                    notes: v.notes
                }));

                elements.lastUpdated.textContent = `Last updated: ${data.catalogVersion || 'Unknown'} • ${data.count || rawData.length} total vulnerabilities`;
                applyFilters();
            } catch (error) {
                showError(`${error.message}<br><br>The GitHub Actions workflow needs to run first to fetch CISA data. Please check the Actions tab.`);
            }
        }

        function applyFilters() {
            const vendor = elements.vendorInput.value.trim().toLowerCase();
            const ransomwareFilter = elements.ransomwareSelect.value;
            const timeRange = elements.timeRangeSelect.value;

            allCves = rawData.filter(cve => {
                // Filter by ransomware
                if (ransomwareFilter === 'known' && !cve.ransomware) {
                    return false;
                }
                if (ransomwareFilter === 'unknown' && cve.ransomware) {
                    return false;
                }
                
                // Filter by vendor/product
                if (vendor) {
                    const vendorMatch = cve.description.toLowerCase().includes(vendor) || 
                                      cve.vendors?.toLowerCase().includes(vendor) ||
                                      cve.product?.toLowerCase().includes(vendor);
                    if (!vendorMatch) return false;
                }
                
                // Filter by time range
                if (timeRange !== 'all') {
                    const days = parseInt(timeRange);
                    const cutoffDate = new Date();
                    cutoffDate.setDate(cutoffDate.getDate() - days);
                    if (cve.publishedDate < cutoffDate) {
                        return false;
                    }
                }
                
                return true;
            });

            if (allCves.length === 0) {
                showEmptyState();
            } else {
                updateStats(allCves);
                renderResults(allCves);
            }
        }

        function renderResults(cves) {
            const sorted = [...cves].sort((a, b) => {
                if (currentSort === 'date') {
                    return b.publishedDate - a.publishedDate;
                } else if (currentSort === 'vendor') {
                    return (a.vendors || '').localeCompare(b.vendors || '');
                } else if (currentSort === 'duedate') {
                    return a.dueDate - b.dueDate;
                }
            });

            elements.resultsHeader.style.display = 'flex';
            elements.resultsCount.textContent = `${sorted.length} result${sorted.length !== 1 ? 's' : ''}`;

            const html = sorted.map(cve => `
                <div class="cve-card">
                    <div class="cve-header">
                        <a href="${cve.url}" target="_blank" class="cve-id">${cve.id}</a>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                            <span class="badge badge-exploited">⚠️ Exploited</span>
                            ${cve.ransomware ? '<span class="badge badge-ransomware">🔒 Ransomware</span>' : ''}
                        </div>
                    </div>
                    <div class="cve-description">
                        ${cve.description}
                    </div>
                    ${cve.action ? `
                        <div class="action-required">
                            <strong>⚡ Required Action:</strong> ${cve.action}
                        </div>
                    ` : ''}
                    <div class="cve-meta">
                        <div class="meta-item">
                            <span class="meta-label">Date Added:</span>
                            <span>${formatDate(cve.publishedDate)}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Due Date:</span>
                            <span style="color: ${isDueSoon(cve.dueDate) ? 'var(--critical)' : 'inherit'};">
                                ${formatDate(cve.dueDate)}${isDueSoon(cve.dueDate) ? ' ⚠️' : ''}
                            </span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Vendor:</span>
                            <span>${cve.vendors}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Product:</span>
                            <span>${cve.product}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            elements.resultsContainer.innerHTML = `<div class="results-grid">${html}</div>`;
        }

        function updateStats(cves) {
            elements.statsBar.style.display = 'flex';
            
            const now = new Date();
            const dueSoon = cves.filter(c => {
                const daysUntilDue = Math.ceil((c.dueDate - now) / (1000 * 60 * 60 * 24));
                return daysUntilDue >= 0 && daysUntilDue <= 7;
            }).length;

            const stats = {
                total: cves.length,
                ransomware: cves.filter(c => c.ransomware).length,
                dueSoon: dueSoon
            };

            elements.statsBar.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Exploited</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Ransomware Use</div>
                    <div class="stat-value" style="color: #ec4899;">${stats.ransomware}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Due Within 7 Days</div>
                    <div class="stat-value" style="color: var(--critical);">${stats.dueSoon}</div>
                </div>
            `;
        }

        function isDueSoon(dueDate) {
            const now = new Date();
            const daysUntilDue = Math.ceil((dueDate - now) / (1000 * 60 * 60 * 24));
            return daysUntilDue >= 0 && daysUntilDue <= 7;
        }

        function showLoading() {
            elements.statsBar.style.display = 'none';
            elements.resultsHeader.style.display = 'none';
            elements.resultsContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading CISA KEV data...</p>
                </div>
            `;
        }

        function showError(message) {
            elements.statsBar.style.display = 'none';
            elements.resultsHeader.style.display = 'none';
            elements.lastUpdated.textContent = 'Failed to load data';
            elements.resultsContainer.innerHTML = `
                <div class="error">
                    <h3>⚠️ Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        function showEmptyState() {
            elements.statsBar.style.display = 'none';
            elements.resultsHeader.style.display = 'none';
            elements.resultsContainer.innerHTML = `
                <div class="empty-state">
                    <h3>🔍 No Results Found</h3>
                    <p>Try adjusting your filters or expanding the time range.</p>
                </div>
            `;
        }

        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days === -1) return 'Tomorrow';
            if (days < 0) return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            if (days < 7) return `${days} days ago`;
            
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }
    </script>
</body>
</html>
