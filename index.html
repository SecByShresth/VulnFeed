<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnFeed - Unified Vulnerability Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
            --critical: #dc2626;
            --high: #ea580c;
            --medium: #ca8a04;
            --low: #16a34a;
            --info: #2563eb;
            --shadow: rgba(15, 23, 42, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 500;
        }

        .tab:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .vuln-grid {
            display: grid;
            gap: 1rem;
        }

        .vuln-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .vuln-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .vuln-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
            gap: 1rem;
        }

        .vuln-id {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .severity-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .severity-critical { background: var(--critical); color: white; }
        .severity-important { background: var(--high); color: white; }
        .severity-high { background: var(--high); color: white; }
        .severity-moderate { background: var(--medium); color: #000; }
        .severity-medium { background: var(--medium); color: #000; }
        .severity-low { background: var(--low); color: white; }
        .severity-unknown { background: var(--text-secondary); color: white; }

        .vuln-description {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .vuln-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 10px 10px -5px rgba(15, 23, 42, 0.04);
        }

        .modal-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .modal-body {
            padding: 2rem;
        }

        .close-modal {
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: var(--accent);
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .detail-value {
            color: var(--text-primary);
        }

        .link-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .link-button:hover {
            background: var(--accent-hover);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--critical);
            padding: 1rem;
            border-radius: 8px;
            color: var(--critical);
            margin-bottom: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ VulnFeed</h1>
            <p class="subtitle">Unified Vulnerability Intelligence Dashboard</p>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalVulns">-</div>
                <div class="stat-label">Total Vulnerabilities</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lastUpdate">-</div>
                <div class="stat-label">Last Updated</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="dataSources">-</div>
                <div class="stat-label">Data Sources</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="criticalCount">-</div>
                <div class="stat-label">Critical/High</div>
            </div>
        </div>

        <div class="tabs" id="tabs"></div>

        <div id="content">
            <div class="loading">Loading vulnerability data...</div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modalTitle"></h2>
                    <div id="modalBadges" style="margin-top: 0.5rem;"></div>
                </div>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const DATA_SOURCES = {
            'cisa-kev': { name: 'CISA KEV', icon: '🇺🇸' },
            'redhat-cves': { name: 'Red Hat', icon: '🎩' },
            'almalinux': { name: 'AlmaLinux', icon: '🐧' },
            'rocky': { name: 'Rocky Linux', icon: '⛰️' },
            'debian': { name: 'Debian', icon: '🌀' },
            'ubuntu': { name: 'Ubuntu', icon: '🟠' },
            'suse': { name: 'SUSE', icon: '🦎' },
            'mysql': { name: 'MySQL', icon: '🐬' },
            'postgresql': { name: 'PostgreSQL', icon: '🐘' },
            'redis': { name: 'Redis', icon: '📮' }
        };

        let allData = {};
        let currentTab = 'dashboard';

        async function loadData() {
            const results = {};
            
            for (const [key, source] of Object.entries(DATA_SOURCES)) {
                try {
                    const response = await fetch(`data/${key}.json`);
                    if (response.ok) {
                        results[key] = await response.json();
                    }
                } catch (error) {
                    console.error(`Failed to load ${key}:`, error);
                }
            }
            
            return results;
        }

        function normalizeVulnerability(vuln, source) {
            // Normalize different data formats
            if (source === 'cisa-kev') {
                return {
                    id: vuln.cveID,
                    title: vuln.vulnerabilityName,
                    description: vuln.shortDescription,
                    severity: vuln.knownRansomwareCampaignUse === 'Known' ? 'critical' : 'high',
                    date: vuln.dateAdded,
                    vendor: vuln.vendorProject,
                    product: vuln.product,
                    dueDate: vuln.dueDate,
                    cvss: null,
                    references: vuln.notes ? [vuln.notes] : [],
                    source: source
                };
            } else if (source === 'redhat-cves') {
                return {
                    id: vuln.CVE,
                    title: vuln.bugzilla_description || vuln.CVE,
                    description: vuln.bugzilla_description || 'No description available',
                    severity: vuln.severity || 'unknown',
                    date: vuln.public_date,
                    cvss: vuln.cvss3_score || vuln.cvss_score,
                    cvssVector: vuln.cvss3_scoring_vector || vuln.cvss_scoring_vector,
                    cwe: vuln.CWE,
                    bugzilla: vuln.bugzilla,
                    affectedPackages: vuln.affected_packages,
                    references: [vuln.resource_url],
                    source: source
                };
            } else if (['almalinux', 'rocky', 'debian', 'ubuntu', 'suse'].includes(source)) {
                return {
                    id: vuln.id,
                    title: vuln.summary || vuln.id,
                    description: vuln.details || 'No description available',
                    severity: vuln.database_specific?.severity || 'unknown',
                    date: vuln.published,
                    modified: vuln.modified,
                    aliases: vuln.aliases || [],
                    affected: vuln.affected || [],
                    references: vuln.references || [],
                    source: source
                };
            } else if (['mysql', 'postgresql', 'redis'].includes(source)) {
                return {
                    id: vuln.id,
                    title: vuln.summary || vuln.id,
                    description: vuln.details || 'No description available',
                    severity: vuln.database_specific?.severity || 
                             (vuln.severity && vuln.severity.length > 0 ? vuln.severity[0].type : 'unknown'),
                    date: vuln.published,
                    modified: vuln.modified,
                    aliases: vuln.aliases || [],
                    affected: vuln.affected || [],
                    references: vuln.references || [],
                    source: source
                };
            }
            
            return vuln;
        }

        function getSeverityClass(severity) {
            if (!severity) return 'severity-unknown';
            const s = severity.toLowerCase();
            if (s.includes('critical')) return 'severity-critical';
            if (s.includes('important') || s.includes('high')) return 'severity-important';
            if (s.includes('moderate') || s.includes('medium')) return 'severity-moderate';
            if (s.includes('low')) return 'severity-low';
            return 'severity-unknown';
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function renderVulnerabilityCard(vuln) {
            return `
                <div class="vuln-card" onclick='showModal(${JSON.stringify(vuln).replace(/'/g, "&apos;")})'>
                    <div class="vuln-header">
                        <div class="vuln-id">${vuln.id}</div>
                        <span class="severity-badge ${getSeverityClass(vuln.severity)}">
                            ${vuln.severity || 'Unknown'}
                        </span>
                    </div>
                    <div class="vuln-description">${vuln.title || vuln.description}</div>
                    <div class="vuln-meta">
                        <div class="meta-item">📅 ${formatDate(vuln.date)}</div>
                        ${vuln.cvss ? `<div class="meta-item">⚠️ CVSS: ${vuln.cvss}</div>` : ''}
                        ${vuln.vendor ? `<div class="meta-item">🏢 ${vuln.vendor}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            let totalVulns = 0;
            let criticalCount = 0;
            let latestDate = null;

            for (const [source, data] of Object.entries(allData)) {
                const vulns = source === 'cisa-kev' ? data.vulnerabilities : data;
                if (Array.isArray(vulns)) {
                    totalVulns += vulns.length;
                    
                    vulns.forEach(v => {
                        const normalized = normalizeVulnerability(v, source);
                        const sev = (normalized.severity || '').toLowerCase();
                        if (sev.includes('critical') || sev.includes('important') || sev.includes('high')) {
                            criticalCount++;
                        }
                        
                        const vDate = new Date(normalized.date);
                        if (!latestDate || vDate > latestDate) {
                            latestDate = vDate;
                        }
                    });
                }
            }

            document.getElementById('totalVulns').textContent = totalVulns.toLocaleString();
            document.getElementById('lastUpdate').textContent = latestDate ? formatDate(latestDate) : 'N/A';
            document.getElementById('dataSources').textContent = Object.keys(allData).length;
            document.getElementById('criticalCount').textContent = criticalCount.toLocaleString();

            let html = '<div class="vuln-grid">';
            
            for (const [source, info] of Object.entries(DATA_SOURCES)) {
                if (!allData[source]) continue;
                
                const data = allData[source];
                const vulns = source === 'cisa-kev' ? data.vulnerabilities : data;
                const count = Array.isArray(vulns) ? vulns.length : 0;
                
                html += `
                    <div class="vuln-card" onclick="switchTab('${source}')">
                        <div class="vuln-header">
                            <div class="vuln-id">${info.icon} ${info.name}</div>
                            <span class="severity-badge severity-unknown">${count} vulns</span>
                        </div>
                        <div class="vuln-description">Click to view ${info.name} vulnerabilities</div>
                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        function renderSource(source) {
            if (!allData[source]) {
                document.getElementById('content').innerHTML = '<div class="empty-state">No data available for this source</div>';
                return;
            }

            const data = allData[source];
            let vulns = source === 'cisa-kev' ? data.vulnerabilities : data;
            
            if (!Array.isArray(vulns) || vulns.length === 0) {
                document.getElementById('content').innerHTML = '<div class="empty-state">No vulnerabilities found</div>';
                return;
            }

            vulns = vulns.slice(0, 100).map(v => normalizeVulnerability(v, source));
            
            let html = '<div class="vuln-grid">';
            vulns.forEach(vuln => {
                html += renderVulnerabilityCard(vuln);
            });
            html += '</div>';
            
            document.getElementById('content').innerHTML = html;
        }

        function showModal(vuln) {
            document.getElementById('modalTitle').textContent = vuln.id;
            document.getElementById('modalBadges').innerHTML = `
                <span class="severity-badge ${getSeverityClass(vuln.severity)}">${vuln.severity || 'Unknown'}</span>
                <span class="tag">${DATA_SOURCES[vuln.source]?.name || vuln.source}</span>
            `;
            
            let body = `
                <div class="detail-section">
                    <div class="detail-label">Description</div>
                    <div class="detail-value">${vuln.description}</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">Published Date</div>
                    <div class="detail-value">${formatDate(vuln.date)}</div>
                </div>
            `;
            
            if (vuln.modified) {
                body += `
                    <div class="detail-section">
                        <div class="detail-label">Last Modified</div>
                        <div class="detail-value">${formatDate(vuln.modified)}</div>
                    </div>
                `;
            }
            
            if (vuln.cvss) {
                body += `
                    <div class="detail-section">
                        <div class="detail-label">CVSS Score</div>
                        <div class="detail-value">${vuln.cvss} ${vuln.cvssVector ? `(${vuln.cvssVector})` : ''}</div>
                    </div>
                `;
            }
            
            if (vuln.cwe) {
                body += `
                    <div class="detail-section">
                        <div class="detail-label">CWE</div>
                        <div class="detail-value">${vuln.cwe}</div>
                    </div>
                `;
            }
            
            if (vuln.aliases && vuln.aliases.length > 0) {
                body += `
                    <div class="detail-section">
                        <div class="detail-label">Aliases</div>
                        <div class="detail-value">
                            ${vuln.aliases.map(a => `<span class="tag">${a}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (vuln.affectedPackages && vuln.affectedPackages.length > 0) {
                body += `
                    <div class="detail-section">
                        <div class="detail-label">Affected Packages</div>
                        <div class="detail-value">
                            ${vuln.affectedPackages.map(p => `<span class="tag">${p}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (vuln.references && vuln.references.length > 0) {
                const refs = Array.isArray(vuln.references) ? vuln.references : [vuln.references];
                body += `
                    <div class="detail-section">
                        <div class="detail-label">References</div>
                        <div class="detail-value">
                            ${refs.map(ref => {
                                const url = typeof ref === 'string' ? ref : ref.url;
                                if (url) {
                                    return `<a href="${url}" target="_blank" class="link-button" style="margin: 0.25rem; display: inline-block;">View Reference →</a>`;
                                }
                                return '';
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
            
            if (tab === 'dashboard') {
                renderDashboard();
            } else {
                renderSource(tab);
            }
        }

        function renderTabs() {
            let html = '<div class="tab active" data-tab="dashboard" onclick="switchTab(\'dashboard\')">📊 Dashboard</div>';
            
            for (const [key, source] of Object.entries(DATA_SOURCES)) {
                if (allData[key]) {
                    html += `<div class="tab" data-tab="${key}" onclick="switchTab('${key}')">${source.icon} ${source.name}</div>`;
                }
            }
            
            document.getElementById('tabs').innerHTML = html;
        }

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initialize
        (async () => {
            try {
                allData = await loadData();
                renderTabs();
                renderDashboard();
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
            }
        })();
    </script>
</body>
</html>
