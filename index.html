<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VulnFeed — Neumorphic Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root { --sidebar-w:260px; --radius:12px; --gap:16px; --transition:220ms cubic-bezier(.2,.9,.2,1); --accent:#9b7cff; --muted:#7b8696; --card-pad:16px; --max-list-height:64vh; }
  /* Light */
  :root[data-theme="light"]{
    --bg:#eef1f6; --panel:#e7ebf0; --text:#0f1724; --muted:#667085;
    --shadow-top: rgba(255,255,255,0.9); --shadow-bottom: rgba(168,175,191,0.35);
    --accent-weak: rgba(155,124,255,0.08);
  }
  /* Dark */
  :root[data-theme="dark"]{
    --bg:#0f1418; --panel:#11151a; --text:#e9eef6; --muted:#98a4b2;
    --shadow-top: rgba(255,255,255,0.03); --shadow-bottom: rgba(0,0,0,0.7);
    --accent-weak: rgba(155,124,255,0.06);
  }

  html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui, -apple-system,"Segoe UI",Roboto, "Helvetica Neue", Arial;color:var(--text);background:linear-gradient(180deg,var(--bg),var(--bg));-webkit-font-smoothing:antialiased}
  .app{display:flex;gap:24px;padding:26px;box-sizing:border-box;min-height:100vh}
  /* SIDEBAR */
  .sidebar{width:var(--sidebar-w);min-width:72px;display:flex;flex-direction:column;gap:14px;transition:width var(--transition)}
  .sidebar.collapsed{width:84px}
  .brand{display:flex;gap:12px;align-items:center;padding:12px;border-radius:12px;background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0.02));box-shadow:6px 6px 16px var(--shadow-bottom),-6px -6px 16px var(--shadow-top)}
  .logo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--accent-weak);color:var(--accent)}
  .brand h1{font-size:16px;margin:0}
  nav.nav{display:flex;flex-direction:column;gap:10px;padding:6px}
  nav a{display:flex;gap:12px;align-items:center;padding:10px;border-radius:10px;color:var(--text);text-decoration:none;font-weight:700;transition:transform var(--transition),background var(--transition)}
  nav a .ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--panel);box-shadow:4px 4px 12px var(--shadow-bottom),-4px -4px 12px var(--shadow-top);color:var(--muted)}
  nav a:hover{transform:translateX(6px)}
  nav a.active{background:linear-gradient(180deg,var(--accent-weak),transparent);color:var(--accent)}
  .sidebar-footer{margin-top:auto;display:flex;gap:8px;align-items:center;justify-content:center;padding:8px}
  .btn{border:none;cursor:pointer;padding:10px;border-radius:10px;background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0.02));box-shadow:6px 6px 16px var(--shadow-bottom),-6px -6px 16px var(--shadow-top);color:var(--text);font-weight:700}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;gap:16px;min-height:calc(100vh - 52px)}
  .topbar{display:flex;align-items:center;gap:12px}
  .search{flex:1;display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0.02));box-shadow:6px 6px 18px var(--shadow-bottom),-6px -6px 18px var(--shadow-top)}
  .search input{background:transparent;border:none;outline:none;color:var(--text);font-size:15px;width:100%}
  .controls{display:flex;gap:10px;align-items:center}
  .pill{padding:8px 12px;border-radius:999px;background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0.02));box-shadow:6px 6px 16px var(--shadow-bottom),-6px -6px 16px var(--shadow-top);color:var(--muted);font-weight:700}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .card{padding:var(--card-pad);border-radius:12px;background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0.02));box-shadow:10px 10px 24px var(--shadow-bottom),-8px -8px 24px var(--shadow-top);transition:transform var(--transition)}
  .card:hover{transform:translateY(-6px)}
  .card h3{margin:0 0 8px 0}
  .meta{display:flex;gap:12px;color:var(--muted);font-size:13px;margin-bottom:10px}
  .desc{color:var(--muted);line-height:1.45}

  /* list */
  .cve-list{display:flex;flex-direction:column;gap:12px;max-height:var(--max-list-height);overflow:auto;padding-right:6px}
  .cve{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:10px;background:linear-gradient(180deg,rgba(0,0,0,0.01),rgba(255,255,255,0.01))}
  .left{width:84px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .id{font-weight:800;color:var(--accent);font-size:13px}
  .muted{color:var(--muted);font-size:13px}
  .sev{font-size:12px;padding:6px 8px;border-radius:8px;font-weight:800}
  .sev-critical{background:linear-gradient(90deg,#ff6b6b,#ff4757);color:#fff}
  .sev-high{background:linear-gradient(90deg,#ff9f43,#ff6b6b);color:#fff}
  .sev-medium{background:linear-gradient(90deg,#ffd66b,#ffb84d);color:#111}
  .sev-low{background:linear-gradient(90deg,#7ef3a6,#26de81);color:#062214}
  .right{flex:1;display:flex;flex-direction:column;gap:8px}
  .title{font-weight:800;color:var(--text)}
  .summary{color:var(--muted);font-size:13px}

  /* responsive */
  @media (max-width:920px){.app{padding:12px}.sidebar{display:none}.sidebar.collapsed{display:none}}
</style>
</head>
<body>
<div class="app" id="appRoot">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">🛡️</div>
      <div style="min-width:0">
        <h1>VulnFeed</h1>
        <div class="muted" style="font-size:12px">Security Intelligence</div>
      </div>
    </div>

    <nav class="nav" id="nav">
      <a href="#" data-section="dashboard" class="active"><span class="ico"><i class="fas fa-chart-pie"></i></span><span class="label">Dashboard</span></a>
      <a href="#" data-section="cisa"><span class="ico"><i class="fas fa-shield-virus"></i></span><span class="label">CISA KEV</span></a>
      <a href="#" data-section="redhat"><span class="ico"><i class="fab fa-redhat"></i></span><span class="label">Red Hat</span></a>
      <a href="#" data-section="exploitdb"><span class="ico"><i class="fas fa-bug"></i></span><span class="label">Exploit-DB</span></a>
      <a href="#" data-section="mysql"><span class="ico"><i class="fas fa-database"></i></span><span class="label">MySQL</span></a>
      <a href="#" data-section="postgresql"><span class="ico"><i class="fas fa-server"></i></span><span class="label">PostgreSQL</span></a>
      <a href="#" data-section="redis"><span class="ico"><i class="fas fa-bolt"></i></span><span class="label">Redis</span></a>
      <a href="#" data-section="settings"><span class="ico"><i class="fas fa-cog"></i></span><span class="label">Settings</span></a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn" id="collapseBtn" title="Toggle sidebar"><i class="fas fa-chevron-left"></i></button>
      <button class="btn" id="themeBtn" title="Toggle theme"><i class="fas fa-moon"></i></button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search">
        <i class="fas fa-search muted"></i>
        <input id="searchInput" placeholder="Search CVE, keyword or ID (e.g. CVE-2024-xxxx)" />
      </div>
      <div class="controls">
        <div class="pill"><select id="severitySelect" style="background:transparent;border:none;color:var(--muted);font-weight:800">
          <option value="all">All severities</option>
          <option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
        </select></div>
        <div class="pill"><select id="timeSelect" style="background:transparent;border:none;color:var(--muted);font-weight:800">
          <option value="30">Last 30 days</option><option value="7">Last 7 days</option><option value="90">Last 90 days</option><option value="365">Last year</option><option value="all">All time</option>
        </select></div>
        <div class="pill"><select id="sortSelect" style="background:transparent;border:none;color:var(--muted);font-weight:800">
          <option value="date">Sort: Newest</option><option value="severity">Sort: Severity</option><option value="source">Sort: Source</option>
        </select></div>
        <button class="btn" id="refreshBtn" title="Refresh feed"><i class="fas fa-sync-alt"></i></button>
      </div>
    </div>

    <section id="summaryArea"></section>
    <section id="contentArea" class="grid"></section>
  </main>
</div>

<script>
/* ------- App state ------- */
const state = {
  theme: localStorage.getItem('vf_theme') || 'light',
  sidebarCollapsed: false,
  activeSection: 'dashboard',
  allVulns: [], // loaded for active section
  lastLoadMeta: {} // store per-file metadata
};

/* ------- Helpers & Theme ------- */
document.documentElement.setAttribute('data-theme', state.theme);
const setTheme = (t) => { state.theme = t; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('vf_theme', t); document.getElementById('themeBtn').innerHTML = t==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'; };
setTheme(state.theme);

/* ------- DOM refs ------- */
const sidebar = document.getElementById('sidebar');
const collapseBtn = document.getElementById('collapseBtn');
const themeBtn = document.getElementById('themeBtn');
const navLinks = document.querySelectorAll('nav.nav a');
const contentArea = document.getElementById('contentArea');
const summaryArea = document.getElementById('summaryArea');
const searchInput = document.getElementById('searchInput');
const severitySelect = document.getElementById('severitySelect');
const timeSelect = document.getElementById('timeSelect');
const sortSelect = document.getElementById('sortSelect');
const refreshBtn = document.getElementById('refreshBtn');

/* ------- Event wiring ------- */
collapseBtn.addEventListener('click', () => {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  sidebar.classList.toggle('collapsed', state.sidebarCollapsed);
  collapseBtn.innerHTML = state.sidebarCollapsed ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-left"></i>';
});
themeBtn.addEventListener('click', () => setTheme(state.theme==='dark'?'light':'dark'));
navLinks.forEach(a => a.addEventListener('click', ev => {
  ev.preventDefault();
  navLinks.forEach(n=>n.classList.remove('active'));
  a.classList.add('active');
  state.activeSection = a.dataset.section;
  loadSection(a.dataset.section);
}));
searchInput.addEventListener('input', renderList);
severitySelect.addEventListener('change', renderList);
timeSelect.addEventListener('change', renderList);
sortSelect.addEventListener('change', renderList);
refreshBtn.addEventListener('click', () => loadSection(state.activeSection,true));

/* ------- Feed name -> file mapping ------- */
const FEEDS = {
  dashboard: null,
  cisa: 'data/cisa-kev.json',
  redhat: 'data/redhat-cves.json',
  exploitdb: 'data/exploitdb.json',
  mysql: 'data/mysql.json',
  postgresql: 'data/postgresql.json',
  redis: 'data/redis.json',
  settings: null
};

/* ------- Generic JSON parsers (auto-detect fields) ------- */
function extractField(obj, candidates){
  if(!obj) return null;
  for(const k of candidates){
    if(k in obj && obj[k] != null) return obj[k];
    // try lowercase
    const low = Object.keys(obj).find(x=>x.toLowerCase()===k.toLowerCase());
    if(low) return obj[low];
  }
  return null;
}

function detectAndNormalize(items, feedKey){
  // items can be array or object (CISA has top-level vulnerabilities array)
  if(!items) return [];
  if(!Array.isArray(items)){
    // try to find array inside object
    for(const k of Object.keys(items)){
      if(Array.isArray(items[k])) { items = items[k]; break; }
    }
    if(!Array.isArray(items)) return [];
  }
  
  // Special handling for different feed types
  if (['mysql', 'postgresql', 'redis', 'exploitdb'].includes(feedKey)) {
    // OSV format from GitHub Action
    return items.map(raw => {
      const id = extractField(raw, ['id', 'cveID', 'CVE', 'name']) || '';
      const title = extractField(raw, ['title', 'summary', 'name']) || id || '';
      const desc = extractField(raw, ['description', 'details', 'summary']) || '';
      const source = extractField(raw, ['source']) || feedKey;
      const aliases = extractField(raw, ['aliases']) || [];
      const affectedPackages = extractField(raw, ['affected_packages']) || [];
      
      // For OSV data, use current date since we don't have published dates
      const publishedDate = new Date();
      
      // Try to extract severity from ID or description
      let severity = '';
      const searchText = (title + ' ' + desc).toLowerCase();
      if (searchText.includes('critical') || id.includes('CRITICAL')) severity = 'critical';
      else if (searchText.includes('high') || id.includes('HIGH')) severity = 'high';
      else if (searchText.includes('medium') || id.includes('MEDIUM')) severity = 'medium';
      else if (searchText.includes('low') || id.includes('LOW')) severity = 'low';
      else severity = 'medium'; // default
      
      // URL construction for OSV
      const url = extractField(raw, ['url']) || (id ? `https://osv.dev/${id}` : '');
      
      return {
        raw, 
        id: id || 'Unknown', 
        title: title || id || 'Untitled',
        description: desc || 'No description available',
        publishedDate,
        severity,
        url,
        source: source || feedKey,
        aliases,
        affectedPackages,
        vendorProject: affectedPackages.length > 0 ? affectedPackages[0] : source
      };
    });
  } else {
    // Original format for CISA and Red Hat
    return items.map(raw => {
      // heuristic candidates
      const id = (extractField(raw, ['cveID','id','CVE','name','cve','vulnerabilityName']) || '').toString();
      const title = extractField(raw, ['title','summary','vulnerabilityName','name','cve','id']) || id || '';
      const desc = extractField(raw, ['description','shortDescription','details','summary','bugzilla_description','vulnerability_description','overview']) || '';
      // date fields
      const dateStr = extractField(raw, ['datePublished','public_date','published','publishedDate','date','advisoryDate','published_at']) || extractField(raw, ['dateAdded','firstSeen']);
      const publishedDate = dateStr ? new Date(dateStr) : null;
      // severity candidates
      const sev = (extractField(raw, ['severity','threat_severity','urgency','priority','baseSeverity','impact']) || '').toString().toLowerCase();
      // url candidates
      const url = extractField(raw, ['url','html_url','resource_url','link','reference','references','advisory_url','cve_url']) || '';
      // vendor/product
      const vendorProject = extractField(raw, ['vendorProject','vendor','vendor_name','product','product_name','package']);
      // cvss
      const cvss = extractField(raw, ['cvss3','cvss','cvss3_score','cvss3_base_score','cvss_score']);
      
      return {
        raw, id, title, description: (desc||'').toString(), publishedDate, severity: normalizeSeverity(sev), url: computeUrl(url, raw, id, feedKey), vendorProject, cvss
      };
    });
  }
}

function computeUrl(urlCandidate, raw, id, feedKey){
  if(urlCandidate) return Array.isArray(urlCandidate)? urlCandidate[0] : urlCandidate;
  // special-cases
  if(feedKey==='cisa') return `https://nvd.nist.gov/vuln/detail/${id}`;
  if(feedKey==='redhat') return raw && raw.bugzilla ? raw.bugzilla : '';
  if(id && id.startsWith('CVE-')) return `https://nvd.nist.gov/vuln/detail/${id}`;
  return '';
}

function normalizeSeverity(s){
  if(!s) return '';
  const s2 = s.toString().toLowerCase();
  if(s2.includes('crit') || s2==='critical') return 'critical';
  if(s2.includes('high')) return 'high';
  if(s2.includes('important')) return 'high';
  if(s2.includes('med') || s2==='moderate' || s2==='medium') return 'medium';
  if(s2.includes('low')) return 'low';
  // CVSS numeric
  const num = parseFloat(s2);
  if(!isNaN(num)){
    if(num>=9) return 'critical'; if(num>=7) return 'high'; if(num>=4) return 'medium'; return 'low';
  }
  return '';
}

/* ------- Fetch & render pipeline ------- */
async function loadSection(section, force=false){
  contentArea.innerHTML = ''; summaryArea.innerHTML = '';
  if(section==='dashboard'){ renderDashboard(); return; }
  if(section==='settings'){ renderSettings(); return; }
  const file = FEEDS[section];
  if(!file){ contentArea.innerHTML = cardHtml('No feed configured','This section has no associated feed file.'); return; }
  showLoading();
  try{
    const res = await fetch(file + (force? `?t=${Date.now()}` : ''));
    if(!res.ok){ contentArea.innerHTML = cardHtml('No data','Feed file not found or returned error.'); return; }
    const json = await res.json();
    // store optional metadata
    state.lastLoadMeta[section] = { loadedAt: new Date().toISOString(), countGuess: Array.isArray(json)?json.length:(json.vulnerabilities?json.vulnerabilities.length:0) };
    const items = detectAndNormalize(json, section);
    state.allVulns = items;
    renderSummary(section, json);
    applyFiltersAndRender();
  }catch(e){
    console.warn('load error',e);
    contentArea.innerHTML = cardHtml('Error','Failed to load feed: '+e.message);
  }
}

/* ------- Rendering helpers ------- */
function cardHtml(title, html){ return `<div class="card"><h3>${title}</h3><div class="desc">${html||''}</div></div>`; }

function showLoading(){ contentArea.innerHTML = cardHtml('Loading','Fetching feed data...'); summaryArea.innerHTML = ''; }

function renderDashboard(){
  // quick overview: list all feeds with counts if available
  const cards = [];
  for(const key of Object.keys(FEEDS)){
    if(!FEEDS[key]) continue;
    const meta = state.lastLoadMeta[key] || {};
    const countDisplay = meta.countGuess != null ? `${meta.countGuess} records` : '—';
    const last = meta.loadedAt ? new Date(meta.loadedAt).toLocaleString() : 'Not loaded';
    cards.push({title: key.toUpperCase(), html: `<div class="meta muted">Records: <strong>${countDisplay}</strong></div><div class="muted small">Last: ${last}</div><div style="margin-top:8px" class="muted">Click to open</div>`});
  }
  contentArea.innerHTML = cards.map(c=>`<div class="card"><h3>${c.title}</h3><div class="desc">${c.html}</div></div>`).join('');
  // clicking card opens section
  document.querySelectorAll('.card').forEach((el, idx) => {
    el.style.cursor='pointer';
    el.addEventListener('click', () => {
      const key = Object.keys(FEEDS).filter(k=>FEEDS[k])[idx];
      const link = document.querySelector(`nav.nav a[data-section="${key}"]`);
      if(link) link.click();
    });
  });
}

/* Render settings */
function renderSettings(){
  contentArea.innerHTML = `
    <div class="card"><h3>Settings</h3>
      <div class="desc muted">Theme, refresh and minor settings</div>
      <div style="margin-top:12px">
        <button class="btn" id="reloadAll">Reload current feed</button>
        <button class="btn" id="reloadAll2">Reload ALL feeds</button>
      </div>
    </div>`;
  document.getElementById('reloadAll').addEventListener('click', ()=> loadSection(state.activeSection,true));
  document.getElementById('reloadAll2').addEventListener('click', async ()=> {
    for(const k of Object.keys(FEEDS)){ if(FEEDS[k]) await loadSection(k,true); }
    alert('Reloaded all feeds (best-effort)');
  });
}

/* Summary bar - shows counts & last updated */
function renderSummary(section, rawJson){
  const meta = state.lastLoadMeta[section] || {};
  const total = state.allVulns.length;
  // compute counts by severity
  const counts = state.allVulns.reduce((acc,it)=>{ acc[it.severity]=(acc[it.severity]||0)+1; return acc; },{});
  const last = meta.loadedAt ? new Date(meta.loadedAt).toLocaleString() : 'N/A';
  let special = '';
  if(section==='redhat'){
    // try to compute rich stats if fields present
    const crit = counts['critical']||0, high=counts['high']||0, med=counts['medium']||0;
    special = `<div class="muted small">Critical: ${crit} • High: ${high} • Medium: ${med}</div>`;
  }
  summaryArea.innerHTML = `<div class="card"><h3>${section.toUpperCase()}</h3><div class="meta muted">Records: <strong>${total}</strong> • Last load: <strong>${last}</strong></div>${special}</div>`;
}

/* ------- Filtering & rendering list ------- */
function applyFiltersAndRender(){
  const q = (searchInput.value||'').trim().toLowerCase();
  const sev = severitySelect.value;
  const days = timeSelect.value;
  let items = state.allVulns.slice();
  if(sev!=='all') items = items.filter(i => (i.severity||'').toLowerCase()===sev);
  if(q) items = items.filter(i => ((i.id||'')+ ' '+ (i.title||'') + ' ' + (i.description||'')).toLowerCase().includes(q));
  if(days!=='all') {
    const cutoff = new Date(Date.now() - parseInt(days)*24*60*60*1000);
    items = items.filter(i => i.publishedDate && i.publishedDate >= cutoff);
  }
  // sorting
  const sort = sortSelect.value;
  items.sort((a,b)=>{
    if(sort==='date') { return (b.publishedDate||0) - (a.publishedDate||0); }
    if(sort==='severity'){ const order={'critical':0,'high':1,'medium':2,'low':3}; return (order[a.severity]||9) - (order[b.severity]||9); }
    if(sort==='source'){ return (a.source||'').localeCompare(b.source||''); }
    return 0;
  });
  state.filtered = items;
  renderList();
}

function renderList(){
  const items = state.filtered || state.allVulns;
  if(!items || items.length===0){ contentArea.innerHTML = cardHtml('No results','No vulnerabilities found for this view.'); return; }
  // build list card
  const listHtml = `<div class="card"><h3>${state.activeSection.toUpperCase()} — ${items.length} items</h3><div class="cve-list">${items.slice(0,1000).map(renderCVE).join('')}</div></div>`;
  contentArea.innerHTML = listHtml;
}

function renderCVE(v){
  const date = v.publishedDate ? (new Date(v.publishedDate)).toLocaleDateString() : 'N/A';
  const sev = v.severity || 'medium';
  const sevClass = sev==='critical'?'sev-critical':(sev==='high'?'sev-high':(sev==='medium'?'sev-medium':'sev-low'));
  const summary = (v.description||'').replace(/\n/g,' ').slice(0,260);
  const url = v.url || (v.id && v.id.startsWith('CVE-')?`https://nvd.nist.gov/vuln/detail/${v.id}`:'#');
  const source = v.source || '';
  
  return `<div class="cve">
    <div class="left">
      <div class="id">${v.id||'—'}</div>
      <div class="muted">${date}</div>
      <div class="sev ${sevClass}">${(v.severity||'').toUpperCase()||'N/A'}</div>
    </div>
    <div class="right">
      <div class="title"><a href="${url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${escapeHtml(v.title||v.id||'Untitled')}</a></div>
      <div class="summary">${escapeHtml(summary)}${(v.description||'').length>260?'…':''}</div>
      <div class="meta">
        <div class="muted small">Source: ${source||'—'}</div>
        ${v.cvss?`<div class="muted small">CVSS: ${v.cvss}</div>`:''}
        ${v.affectedPackages && v.affectedPackages.length > 0 ? `<div class="muted small">Packages: ${v.affectedPackages.slice(0,2).join(', ')}${v.affectedPackages.length > 2 ? '...' : ''}</div>` : ''}
      </div>
    </div>
  </div>`;
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ------- Boot: load initial dashboard ------- */
loadSection('dashboard');

/* Expose to console for debugging */
window.VulnFeed = { loadSection, state, FEEDS };
</script>
