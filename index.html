<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VulnFeed — Vulnerability Intelligence Dashboard</title>
<style>
:root {
  --bg-light: #f6f6f6;
  --bg-dark: #181a1b;
  --card-light: #ffffff;
  --card-dark: #232527;
  --text-light: #222;
  --text-dark: #e6e6e6;
  --accent: #5c6bc0;
  --shadow-light: rgba(0,0,0,0.08);
  --shadow-dark: rgba(255,255,255,0.08);
}
body {
  margin: 0;
  font-family: "Inter", system-ui, sans-serif;
  background: var(--bg-light);
  color: var(--text-light);
  transition: background 0.3s, color 0.3s;
}
body.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  background: var(--card-light);
  box-shadow: 0 2px 6px var(--shadow-light);
}
body.dark header {
  background: var(--card-dark);
  box-shadow: 0 2px 6px var(--shadow-dark);
}
h1 { margin: 0; font-size: 1.4rem; }
button {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 0.4rem 0.8rem;
  cursor: pointer;
}
main { padding: 2rem; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}
.card {
  background: var(--card-light);
  border-radius: 1rem;
  box-shadow: 4px 4px 8px var(--shadow-light), -4px -4px 8px white;
  padding: 1rem 1.4rem;
  cursor: pointer;
  transition: 0.3s;
}
body.dark .card {
  background: var(--card-dark);
  box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px #111;
}
.card:hover { transform: translateY(-3px); }
.feed-detail { display: none; }
.feed-detail.active { display: block; }
.back-btn {
  margin-bottom: 1rem;
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 8px;
}
.vuln-card {
  background: var(--card-light);
  border-radius: 0.8rem;
  padding: 1rem;
  margin-bottom: 1rem;
  box-shadow: 2px 2px 5px var(--shadow-light), -2px -2px 5px white;
}
body.dark .vuln-card {
  background: var(--card-dark);
  box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px #111;
}
.vuln-card h3 { margin: 0 0 0.4rem; color: var(--accent); }
.vuln-meta { font-size: 0.9rem; color: gray; margin-bottom: 0.6rem; }
a.ref { display: block; font-size: 0.85rem; color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>VulnFeed Dashboard</h1>
  <button id="theme-toggle">Toggle Theme</button>
</header>

<main>
  <section id="dashboard">
    <h2>Feeds Overview</h2>
    <div id="feed-grid" class="grid"></div>
  </section>

  <section id="feed-detail" class="feed-detail">
    <button class="back-btn" onclick="showDashboard()">← Back</button>
    <h2 id="feed-title"></h2>
    <div id="feed-content"></div>
  </section>
</main>

<script>
const feeds = [
  "mysql","postgresql","redis","redhat-cves","cisa-kev",
  "almalinux","debian","ubuntu","rocky","suse"
];
const grid = document.getElementById("feed-grid");
const dashboard = document.getElementById("dashboard");
const detail = document.getElementById("feed-detail");
const content = document.getElementById("feed-content");
const title = document.getElementById("feed-title");

// Theme toggle
document.getElementById("theme-toggle").onclick = () =>
  document.body.classList.toggle("dark");

// --- DASHBOARD ---
async function loadDashboard() {
  grid.innerHTML = "";
  for (const f of feeds) {
    try {
      const res = await fetch(`data/${f}.json`);
      const data = await res.json();
      const { count, lastUpdated } = summarizeFeed(data);
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${f.toUpperCase()}</h3>
        <p>Total Entries: <b>${count}</b></p>
        <p>Last Updated: <b>${lastUpdated || "N/A"}</b></p>`;
      card.onclick = () => loadFeedDetail(f);
      grid.appendChild(card);
    } catch (e) {
      console.warn("Failed to load", f, e);
    }
  }
}
function summarizeFeed(data) {
  let arr = [];
  if (Array.isArray(data)) arr = data;
  else if (data.vulnerabilities) arr = data.vulnerabilities;
  const count = arr.length;
  const lastUpdated = extractLatestDate(arr);
  return { count, lastUpdated };
}
function extractLatestDate(arr) {
  const dates = arr.map(x =>
    x.modified || x.dateAdded || x.public_date || x.published || x._metadata?.fetched_at
  ).filter(Boolean);
  if (!dates.length) return null;
  return new Date(Math.max(...dates.map(d => new Date(d)))).toISOString().split("T")[0];
}

// --- DETAIL VIEW ---
async function loadFeedDetail(feedName) {
  dashboard.style.display = "none";
  detail.classList.add("active");
  title.textContent = feedName.toUpperCase();
  content.innerHTML = "<p>Loading...</p>";

  try {
    const res = await fetch(`data/${feedName}.json`);
    const data = await res.json();
    renderFeed(data);
  } catch {
    content.innerHTML = `<p>Error loading ${feedName}</p>`;
  }
}

function renderFeed(data) {
  let vulns = Array.isArray(data) ? data : data.vulnerabilities || [];
  if (!vulns.length) {
    content.innerHTML = "<p>No vulnerabilities found.</p>";
    return;
  }

  content.innerHTML = "";
  vulns.forEach(v => {
    const cve = v.aliases?.[0] || v.id || v.CVE || "Unknown";
    const summary = v.summary || v.shortDescription || v.details || "No summary.";
    const desc = v.details || v.bugzilla_description || "";
    const sev = v.database_specific?.severity || v.severity || "N/A";
    const date = v.published || v.public_date || v.modified || v._metadata?.fetched_at || "Unknown";
    const eco = v.affected?.[0]?.package?.ecosystem || "N/A";
    const refs = v.references?.map(r => `<a class="ref" href="${r.url}" target="_blank">${r.url}</a>`).join("") || "";

    const card = document.createElement("div");
    card.className = "vuln-card";
    card.innerHTML = `
      <h3>${cve}</h3>
      <div class="vuln-meta"><b>Severity:</b> ${sev} | <b>Date:</b> ${date} | <b>Ecosystem:</b> ${eco}</div>
      <p><b>${summary}</b></p>
      <p>${desc}</p>
      ${refs}`;
    content.appendChild(card);
  });
}

function showDashboard() {
  dashboard.style.display = "block";
  detail.classList.remove("active");
}

loadDashboard();
</script>
</body>
</html>
