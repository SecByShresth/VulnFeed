<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VulnFeed Dashboard</title>
<style>
  :root {
    --bg: #f1f3f6;
    --card-bg: #fff;
    --text: #222;
    --accent: #6c63ff;
    --shadow: 5px 5px 10px #c5c7ca, -5px -5px 10px #ffffff;
  }
  [data-theme="dark"] {
    --bg: #1a1b1f;
    --card-bg: #232428;
    --text: #f1f1f1;
    --accent: #8b80ff;
    --shadow: 5px 5px 15px #111, -5px -5px 15px #2a2b30;
  }

  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    transition: background 0.4s, color 0.4s;
  }

  /* Sidebar */
  #sidebar {
    width: 250px;
    background: var(--bg);
    box-shadow: var(--shadow);
    padding: 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #sidebar h2 {
    margin-top: 0;
    text-align: center;
  }
  .tab {
    cursor: pointer;
    margin: 0.5rem 0;
    padding: 0.6rem 0.8rem;
    border-radius: 10px;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    text-align: center;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: white;
    transform: scale(1.02);
  }

  #themeToggle {
    margin-top: auto;
    background: var(--card-bg);
    border: none;
    padding: 0.6rem;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-weight: 600;
  }

  /* Content */
  #content {
    flex: 1;
    padding: 1rem 2rem;
    overflow-y: auto;
  }

  .vuln-card {
    background: var(--card-bg);
    box-shadow: var(--shadow);
    border-radius: 15px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    transition: all 0.2s;
  }
  .vuln-card:hover {
    transform: scale(1.01);
  }
  .vuln-id {
    color: var(--accent);
    font-weight: 700;
  }
  .vuln-severity {
    font-weight: bold;
    float: right;
  }
  .vuln-desc {
    margin-top: 0.5rem;
    font-size: 0.95rem;
  }
  .vuln-link {
    display: inline-block;
    margin-top: 0.5rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body data-theme="light">
  <div id="sidebar">
    <h2>🐧 VulnFeed</h2>
    <div id="tabs"></div>
    <button id="themeToggle">🌙 Dark Mode</button>
  </div>

  <div id="content">
    <h1>Loading Vulnerabilities...</h1>
  </div>

<script>
const feeds = {
  "Red Hat": "data/redhat.json",
  "AlmaLinux": "data/almalinux.json",
  "Rocky Linux": "data/rocky.json",
  "Debian": "data/debian.json",
  "Ubuntu": "data/ubuntu.json",
  "SUSE": "data/suse.json",
  "MySQL": "data/mysql.json",
  "PostgreSQL": "data/postgresql.json",
  "Redis": "data/redis.json"
};

function normalizeVuln(v, feedKey) {
  const id = v.id || v.GUID || v.vulnId || "Unknown ID";
  const title =
    v.summary || v.title || v.name || (v.details?.split("\n")[0]) || "No title available";
  const description =
    v.details || v.description || v.overview || "No description provided";

  const sev =
    (Array.isArray(v.severity) ? v.severity[0] : v.severity) ||
    v.database_specific?.severity ||
    v.CVSS3_Score ||
    v.impact ||
    "UNKNOWN";

  let url =
    v.references?.[0]?.url ||
    v.source ||
    (v.id && v.id.startsWith("CVE-") ? `https://nvd.nist.gov/vuln/detail/${v.id}` : null) ||
    `https://osv.dev/vulnerability/${v.id}`;

  if (feedKey.toLowerCase().includes("redhat") && !url.includes("access.redhat.com")) {
    url = `https://access.redhat.com/errata/${id}`;
  }

  return { id, title, description, severity: sev.toUpperCase(), url };
}

async function loadFeed(feedKey, filePath) {
  try {
    const res = await fetch(filePath);
    const data = await res.json();
    const normalized = data.map(v => normalizeVuln(v, feedKey));
    renderFeed(feedKey, normalized);
  } catch (e) {
    document.getElementById("content").innerHTML = `<h3>Error loading ${feedKey}: ${e}</h3>`;
  }
}

function renderFeed(feedKey, data) {
  const content = document.getElementById("content");
  content.innerHTML = `<h1>${feedKey} Vulnerabilities (${data.length})</h1>`;
  data.forEach(v => {
    const div = document.createElement("div");
    div.className = "vuln-card";
    div.innerHTML = `
      <div>
        <span class="vuln-id">${v.id}</span>
        <span class="vuln-severity">${v.severity}</span>
      </div>
      <div class="vuln-title"><strong>${v.title}</strong></div>
      <div class="vuln-desc">${v.description}</div>
      <a class="vuln-link" href="${v.url}" target="_blank">🔗 View Report</a>
    `;
    content.appendChild(div);
  });
}

function initTabs() {
  const tabs = document.getElementById("tabs");
  Object.keys(feeds).forEach((key, i) => {
    const div = document.createElement("div");
    div.className = "tab" + (i === 0 ? " active" : "");
    div.innerText = key;
    div.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      div.classList.add("active");
      loadFeed(key, feeds[key]);
    };
    tabs.appendChild(div);
  });
  // Load first feed
  loadFeed(Object.keys(feeds)[0], Object.values(feeds)[0]);
}

document.getElementById("themeToggle").onclick = () => {
  const body = document.body;
  const isDark = body.getAttribute("data-theme") === "dark";
  body.setAttribute("data-theme", isDark ? "light" : "dark");
  document.getElementById("themeToggle").innerText = isDark ? "🌙 Dark Mode" : "☀️ Light Mode";
};

initTabs();
</script>
</body>
</html>
