<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VulnFeed — Unified Vulnerability Dashboard</title>
<style>
  body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: #e0e5ec;
    margin: 0;
    padding: 0;
    color: #333;
  }
  header {
    text-align: center;
    padding: 2rem;
    box-shadow: inset 6px 6px 12px #c5c9ce, inset -6px -6px 12px #fff;
    background: #e0e5ec;
    margin-bottom: 2rem;
  }
  header h1 {
    margin: 0;
    font-size: 2rem;
    color: #222;
  }
  .source-selector {
    text-align: center;
    margin-bottom: 2rem;
  }
  select {
    padding: 0.6rem 1rem;
    border-radius: 12px;
    border: none;
    background: #e0e5ec;
    box-shadow: 5px 5px 10px #c5c9ce, -5px -5px 10px #fff;
    font-size: 1rem;
    color: #333;
  }
  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
    padding: 0 2rem 2rem;
  }
  .card {
    border-radius: 16px;
    background: #e0e5ec;
    box-shadow: 6px 6px 12px #c5c9ce, -6px -6px 12px #fff;
    padding: 1.5rem;
    transition: transform 0.15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
  }
  .card h3 {
    margin-top: 0;
    font-size: 1.1rem;
  }
  .card p {
    font-size: 0.9rem;
    margin: 0.4rem 0;
  }
  .severity {
    font-weight: bold;
  }
  footer {
    text-align: center;
    padding: 1rem;
    color: #777;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<header>
  <h1>VulnFeed — Unified Vulnerability Dashboard</h1>
</header>

<div class="source-selector">
  <select id="sourceSelect">
    <option value="cisa">CISA KEV</option>
    <option value="mysql">MySQL</option>
    <option value="postgresql">PostgreSQL</option>
    <option value="redis">Redis</option>
    <option value="redhat">Red Hat</option>
    <option value="almalinux">AlmaLinux</option>
    <option value="debian">Debian</option>
    <option value="ubuntu">Ubuntu</option>
    <option value="rocky">Rocky Linux</option>
    <option value="suse">SUSE</option>
  </select>
</div>

<div class="container" id="vulnContainer">
  <p style="text-align:center;width:100%">Loading vulnerabilities...</p>
</div>

<footer>
  VulnFeed &copy; 2025 — Data sourced from public advisories and CISA.
</footer>

<script>
const sources = [
  // --- CISA ---
  {
    name: "CISA KEV",
    file: "data/cisa-kev.json",
    parse: (data) => data.vulnerabilities.map(v => ({
      id: v.cveID,
      title: v.vulnerabilityName,
      severity: "N/A",
      date: v.dateAdded,
      desc: v.shortDescription
    }))
  },

  // --- MySQL ---
  {
    name: "MySQL",
    file: "data/mysql.json",
    parse: (data) => data.vulnerabilities.map(v => ({
      id: v.id || v.cve,
      title: v.title || v.name,
      severity: v.severity || "Unknown",
      date: v.date || v.published || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- PostgreSQL ---
  {
    name: "PostgreSQL",
    file: "data/postgresql.json",
    parse: (data) => data.map(v => ({
      id: v.cve || v.id,
      title: v.title || v.name,
      severity: v.severity || "Unknown",
      date: v.date || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- Redis ---
  {
    name: "Redis",
    file: "data/redis.json",
    parse: (data) => data.map(v => ({
      id: v.cve || v.id,
      title: v.title || v.summary || "Unknown Vulnerability",
      severity: v.severity || "Unknown",
      date: v.date || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- Red Hat (Fixed Parsing) ---
  {
    name: "Red Hat",
    file: "data/redhat-cves.json",
    parse: (data) => {
      const items = data.data || data.CVE_Items || [];
      return items.map(item => {
        const cve =
          (item.CVE && item.CVE.CVE_data_meta && item.CVE.CVE_data_meta.ID) ||
          item.cve || item.id || "Unknown CVE";
        const description =
          (item.details && item.details[0] && item.details[0].description) ||
          (item.description && item.description.value) ||
          (item.CVE && item.CVE.description && item.CVE.description.description_data && item.CVE.description.description_data[0]?.value) ||
          (item.impact && item.impact.description) ||
          "Unknown Vulnerability";
        const severity =
          (item.impact && item.impact.severity) ||
          item.threat_severity ||
          (item.impact && item.impact.baseMetricV3 && item.impact.baseMetricV3.cvssV3?.baseSeverity) ||
          "Unknown";
        const date =
          item.public_date ||
          item.published ||
          item.date ||
          (item.CVE_data_meta && item.CVE_data_meta.DATE_PUBLIC) ||
          new Date().toISOString();
        return {
          id: cve,
          title: description,
          severity,
          date,
          desc: description
        };
      });
    }
  },

  // --- AlmaLinux ---
  {
    name: "AlmaLinux",
    file: "data/almalinux.json",
    parse: (data) => data.map(v => ({
      id: v.cve || v.id,
      title: v.title || "Unknown Vulnerability",
      severity: v.severity || "Unknown",
      date: v.date || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- Debian ---
  {
    name: "Debian",
    file: "data/debian.json",
    parse: (data) => data.map(v => ({
      id: v.cve_id || v.id,
      title: v.description || "Unknown Vulnerability",
      severity: v.severity || "Unknown",
      date: v.date || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- Ubuntu ---
  {
    name: "Ubuntu",
    file: "data/ubuntu.json",
    parse: (data) => data.map(v => ({
      id: v.id || v.cve_id,
      title: v.title || v.summary || "Unknown Vulnerability",
      severity: v.priority || v.severity || "Unknown",
      date: v.published || v.date || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- Rocky Linux ---
  {
    name: "Rocky Linux",
    file: "data/rocky.json",
    parse: (data) => data.map(v => ({
      id: v.cve || v.id,
      title: v.title || "Unknown Vulnerability",
      severity: v.severity || "Unknown",
      date: v.date || "Unknown",
      desc: v.description || "No description"
    }))
  },

  // --- SUSE ---
  {
    name: "SUSE",
    file: "data/suse.json",
    parse: (data) => data.map(v => ({
      id: v.cve_id || v.id,
      title: v.title || "Unknown Vulnerability",
      severity: v.severity || "Unknown",
      date: v.date || "Unknown",
      desc: v.description || "No description"
    }))
  }
];

async function loadSource(name) {
  const source = sources.find(s => s.name.toLowerCase().includes(name.toLowerCase()));
  const container = document.getElementById("vulnContainer");
  container.innerHTML = `<p style="text-align:center;width:100%">Loading ${source.name} data...</p>`;

  try {
    const res = await fetch(source.file);
    const json = await res.json();
    const vulns = source.parse(json);
    if (!vulns.length) throw new Error("No vulnerabilities found.");

    container.innerHTML = vulns.slice(0, 30).map(v => `
      <div class="card">
        <h3>${v.id || "Unknown ID"}</h3>
        <p><strong>${v.title}</strong></p>
        <p class="severity">Severity: ${v.severity}</p>
        <p><em>Date:</em> ${v.date}</p>
        <p>${v.desc || ""}</p>
      </div>
    `).join("");
  } catch (err) {
    container.innerHTML = `<p style="text-align:center;width:100%;color:#c00">Error loading ${source.name}: ${err.message}</p>`;
  }
}

document.getElementById("sourceSelect").addEventListener("change", (e) => {
  loadSource(e.target.value);
});

// default load
loadSource("cisa");
</script>

</body>
</html>
