<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnFeed Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        /*
        ==================================================
        CSS: Neumorphic Design & Theming
        ==================================================
        */
        :root {
            /* Light Theme Variables */
            --bg-color: #e0e5ec;
            --surface-color: #f0f3f6;
            --text-color: #3f51b5; /* Primary accent color */
            --sub-text-color: #4a4a4a;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent-glow: rgba(63, 81, 181, 0.2);
            --border-radius: 12px;
        }

        [data-theme='dark'] {
            /* Dark Theme Variables */
            --bg-color: #2e3235;
            --surface-color: #3b4043;
            --text-color: #a0c3ff;
            --sub-text-color: #d1d1d1;
            --shadow-light: #444a4e;
            --shadow-dark: #232628;
            --accent-glow: rgba(160, 195, 255, 0.2);
        }

        /* Severity Colors */
        .severity-CRITICAL { background-color: #cc0000; color: white; }
        .severity-HIGH { background-color: #ff8800; color: white; }
        .severity-MEDIUM { background-color: #dddd00; color: #333; }
        .severity-LOW { background-color: #00cc00; color: white; }
        .severity-IMPORTANT { background-color: #3f51b5; color: white; } /* Mapping RedHat's 'important' */
        .severity-MODERATE { background-color: #0099cc; color: white; } /* Mapping RedHat's 'moderate' */
        .severity-LOWEST { background-color: #aaaaaa; color: #333; } /* Mapping RedHat's 'low' */
        .severity-NONE { background-color: #e0e0e0; color: #333; }

        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--sub-text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        a {
            color: var(--text-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Neumorphic Helper Class */
        .neumorphic {
            background: var(--bg-color);
            border-radius: var(--border-radius);
            box-shadow: 7px 7px 15px var(--shadow-dark),
                        -7px -7px 15px var(--shadow-light);
            transition: box-shadow 0.3s, background-color 0.3s;
        }

        .neumorphic-inset {
            background: var(--bg-color);
            border-radius: var(--border-radius);
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
            transition: box-shadow 0.3s, background-color 0.3s;
        }

        /* Header and Controls */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        #header h1 {
            color: var(--text-color);
            margin: 0;
        }

        #controls {
            display: flex;
            gap: 15px;
        }

        .control-button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            transition: all 0.2s;
        }

        .control-button:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
        }

        #search-container {
            display: flex;
            align-items: center;
        }

        #search-input {
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            color: var(--sub-text-color);
            width: 300px;
            outline: none;
            background: transparent;
            border-radius: var(--border-radius);
        }

        .tab-controls {
            display: flex;
            flex-wrap: wrap;
            padding: 0 40px;
            margin-bottom: 20px;
        }

        .tab-button {
            padding: 10px 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            color: var(--sub-text-color);
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
        }

        .tab-button:hover:not(.active) {
            color: var(--text-color);
        }

        .tab-button.active {
            color: var(--text-color);
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
        }

        .count-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            padding: 2px 8px;
            background: var(--text-color);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
        }

        /* Content Area */
        #content-area {
            padding: 0 40px 40px 40px;
        }

        .tab-content {
            display: none;
            padding-top: 20px;
        }

        .tab-content.active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Vulnerability Card */
        .vuln-card {
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .vuln-card:hover {
            box-shadow: 10px 10px 20px var(--shadow-dark),
                        -10px -10px 20px var(--shadow-light);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-id {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--text-color);
        }

        .card-severity {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-title {
            font-size: 1em;
            margin: 5px 0 10px 0;
            color: var(--sub-text-color);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Limit to 2 lines */
            -webkit-box-orient: vertical;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: var(--shadow-dark);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 10px;
            margin-top: 10px;
        }

        /* Filter Controls */
        #filter-container {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 40px 20px;
        }

        .filter-label {
            color: var(--sub-text-color);
            font-weight: 600;
        }

        #severity-filter {
            padding: 8px 12px;
            border: none;
            background: var(--bg-color);
            color: var(--sub-text-color);
            cursor: pointer;
        }
        
        #severity-filter.neumorphic-inset {
            border: none; /* Override default select border */
            appearance: none; /* Remove default arrow on some browsers */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2012%2012%22%3E%3Cpath%20d%3D%22M10.293%203.293%206%207.586%201.707%203.293%20.293%204.707%206%2010.414%2011.707%204.707z%22%20fill%3D%22%234a4a4a%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            padding-right: 30px; /* Space for custom arrow */
        }
        [data-theme='dark'] #severity-filter.neumorphic-inset {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2012%2012%22%3E%3Cpath%20d%3D%22M10.293%203.293%206%207.586%201.707%203.293%20.293%204.707%206%2010.414%2011.707%204.707z%22%20fill%3D%22%23d1d1d1%22%2F%3E%3C%2Fsvg%3E");
        }


        /* Modal for Full Details */
        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
            display: none;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--surface-color);
            margin: 10% auto;
            padding: 30px;
            width: 80%;
            max-width: 700px;
            position: relative;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-button {
            color: var(--text-color);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-button:hover,
        .close-button:focus {
            color: var(--shadow-dark);
            text-decoration: none;
            cursor: pointer;
        }

        .modal-header {
            border-bottom: 1px solid var(--shadow-dark);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            color: var(--text-color);
        }

        .modal-body p {
            margin: 5px 0;
            line-height: 1.6;
        }

        .modal-body strong {
            color: var(--sub-text-color);
            display: inline-block;
            min-width: 120px;
        }
        
        .modal-body .full-description {
            white-space: pre-wrap;
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-top: 10px;
            box-shadow: inset 2px 2px 5px var(--shadow-dark),
                        inset -2px -2px 5px var(--shadow-light);
        }

        /* Initial Dashboard Summary */
        #summary-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            padding: 0 40px 40px;
        }

        .summary-box {
            padding: 25px;
            text-align: center;
            cursor: pointer;
        }

        .summary-box h3 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
            color: var(--text-color);
        }

        .summary-box .count {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--sub-text-color);
        }

        .summary-box .meta {
            font-size: 0.8em;
            color: var(--shadow-dark);
            margin-top: 5px;
        }

        .summary-box:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
        }

        /* Loading Indicator */
        #loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            font-size: 1.2em;
            color: var(--text-color);
            display: none; /* Hidden by default */
            z-index: 1001;
        }

    </style>
</head>
<body>

    <div id="loading-indicator" class="neumorphic">Loading data...</div>

    <header id="header">
        <h1>VulnFeed Dashboard 🛡️</h1>
        <div id="controls">
            <div id="search-container" class="neumorphic-inset">
                <i class="material-icons" style="padding-left: 10px; color: var(--shadow-dark);">search</i>
                <input type="text" id="search-input" placeholder="Search by ID or Title..." oninput="handleFilterChange()">
            </div>
            <button id="theme-toggle" class="control-button neumorphic" onclick="toggleTheme()">
                <i class="material-icons">brightness_4</i>
            </button>
        </div>
    </header>

    <hr style="border: 0; height: 1px; background-image: linear-gradient(to right, var(--bg-color), var(--shadow-dark), var(--bg-color)); margin: 0 40px;">

    <section id="summary-dashboard">
        </section>

    <hr style="border: 0; height: 1px; background-image: linear-gradient(to right, var(--bg-color), var(--shadow-dark), var(--bg-color)); margin: 0 40px;">

    <nav class="tab-controls" id="tab-nav">
        </nav>

    <section id="filter-container">
        <label for="severity-filter" class="filter-label">Filter by Severity:</label>
        <select id="severity-filter" class="neumorphic-inset" onchange="handleFilterChange()">
            <option value="">All Severities</option>
            <option value="CRITICAL">Critical</option>
            <option value="HIGH">High</option>
            <option value="MEDIUM">Medium</option>
            <option value="LOW">Low</option>
            <option value="IMPORTANT">Important</option>
            <option value="MODERATE">Moderate</option>
            <option value="LOWEST">Lowest</option>
            <option value="NONE">None</option>
        </select>
    </section>

    <main id="content-area">
        </main>

    <div id="details-modal" class="modal" onclick="if(event.target.id === 'details-modal') closeModal()">
        <div class="modal-content neumorphic">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-id"></h2>
                <span id="modal-severity" class="card-severity"></span>
            </div>
            <div id="modal-body" class="modal-body">
                </div>
        </div>
    </div>

    <script>
        // Set up the file paths and their display names
        const VULN_FEEDS = {
            'cisa': 'cisa-kev.json',
            'redhat': 'redhat-cves.json',
            'mysql': 'mysql.json',
            'postgresql': 'postgresql.json',
            'redis': 'redis.json',
            'ubuntu': 'ubuntu.json',
            'debian': 'debian.json',
            'suse': 'suse.json',
            'almalinux': 'almalinux.json',
            'rocky': 'rocky.json',
        };

        // Global data store
        const VULN_DATA = {};
        const DATA_FETCHED_TIME = new Date().toISOString();

        /*
        ==================================================
        Data Normalization Functions
        ==================================================
        */

        /**
         * Cleans and normalizes severity strings to a consistent format.
         * @param {string} severity - The severity string from the source.
         * @returns {string} - The normalized severity (e.g., 'CRITICAL', 'HIGH').
         */
        function normalizeSeverity(severity) {
            if (!severity) return 'NONE';
            const s = String(severity).toUpperCase().trim();
            if (s.includes('CRIT')) return 'CRITICAL';
            if (s.includes('HIGH') || s.includes('MAJOR')) return 'HIGH';
            if (s.includes('MEDIUM') || s.includes('MODERATE')) return 'MEDIUM';
            if (s.includes('LOW') || s.includes('MINOR')) return 'LOW';
            // RedHat specific severities
            if (s.includes('IMPORTANT')) return 'IMPORTANT';
            if (s.includes('LOWEST')) return 'LOWEST';
            return s; // Return as is if unknown (e.g., 'NONE', 'MODERATE', etc.)
        }

        /**
         * Normalizes a CISA vulnerability object.
         * @param {object} vuln - The raw CISA object.
         * @returns {object} - The normalized view model.
         */
        function normalizeCISA(vuln) {
            const id = vuln.cveID || `CISA-${vuln.dateAdded}`;
            return {
                id: id,
                title: vuln.vulnerabilityName,
                summary: vuln.shortDescription,
                description: vuln.shortDescription,
                severity: normalizeSeverity('CRITICAL'), // CISA KEV are implicitly critical/high
                publishedDate: vuln.dateAdded,
                modifiedDate: vuln.dueDate,
                sourceLink: vuln.notes ? vuln.notes.split(' ; ')[1] : `https://nvd.nist.gov/vuln/detail/${id}`,
                sourceName: 'CISA KEV',
                rawData: vuln // Keep the raw data for the modal
            };
        }

        /**
         * Normalizes an OSV vulnerability object.
         * @param {object} vuln - The raw OSV object.
         * @returns {object} - The normalized view model.
         */
        function normalizeOSV(vuln) {
            const id = vuln.aliases && vuln.aliases.length > 0 && vuln.aliases.find(a => a.startsWith('CVE-')) || vuln.id;
            const severity = vuln.database_specific?.severity || vuln.severity?.[0]?.score || 'MEDIUM';
            const link = vuln.references?.find(r => r.type === 'ADVISORY' || r.type === 'WEB')?.url || '#';

            return {
                id: id,
                title: vuln.summary,
                summary: vuln.summary,
                description: vuln.details,
                severity: normalizeSeverity(severity),
                publishedDate: vuln.published,
                modifiedDate: vuln.modified,
                sourceLink: link,
                sourceName: 'OSV.dev',
                rawData: vuln
            };
        }

        /**
         * Normalizes a RedHat vulnerability object.
         * @param {object} vuln - The raw RedHat object.
         * @returns {object} - The normalized view model.
         */
        function normalizeRedHat(vuln) {
            const id = vuln.CVE;
            const description = vuln.bugzilla_description || 'No description available.';
            const link = vuln.resource_url || `https://access.redhat.com/security/cve/${id}`;

            return {
                id: id,
                title: description,
                summary: description.substring(0, 150) + (description.length > 150 ? '...' : ''),
                description: description,
                severity: normalizeSeverity(vuln.severity),
                publishedDate: vuln.public_date,
                modifiedDate: vuln.public_date,
                sourceLink: link,
                sourceName: 'RedHat',
                rawData: vuln
            };
        }

        /**
         * Main function to choose the correct normalization based on source.
         * @param {string} source - The source key (e.g., 'cisa', 'mysql').
         * @param {object} item - The raw vulnerability object.
         * @returns {object} - The normalized view model.
         */
        function normalizeItem(source, item) {
            if (source === 'cisa') {
                return normalizeCISA(item);
            }
            if (source === 'redhat') {
                return normalizeRedHat(item);
            }
            // All other feeds are treated as OSV-based
            return normalizeOSV(item);
        }

        /*
        ==================================================
        Data Fetching and Initialization
        ==================================================
        */

        /**
         * Fetches and processes all JSON data feeds.
         */
        async function initializeDashboard() {
            document.getElementById('loading-indicator').style.display = 'block';

            const promises = Object.entries(VULN_FEEDS).map(([key, file]) =>
                fetch(`/data/${file}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(data => {
                        // Extract array of vulnerabilities based on source structure
                        let vulnerabilities = [];
                        if (key === 'cisa') {
                            vulnerabilities = data.vulnerabilities || [];
                        } else if (key === 'redhat') {
                            vulnerabilities = Array.isArray(data) ? data : [];
                        } else {
                            vulnerabilities = Array.isArray(data) ? data : []; // OSV and others
                        }

                        // Normalize and store the data
                        VULN_DATA[key] = vulnerabilities.map(vuln => normalizeItem(key, vuln));
                    })
                    .catch(error => {
                        console.error(`Error loading ${file}:`, error);
                        VULN_DATA[key] = [];
                    })
            );

            await Promise.all(promises);

            // Hide loading indicator
            document.getElementById('loading-indicator').style.display = 'none';

            // Initial UI rendering
            renderTabs();
            renderSummaryDashboard();
            // Automatically switch to the first tab, defaulting to 'cisa'
            const firstTab = Object.keys(VULN_FEEDS)[0];
            if (firstTab) switchTab(firstTab);

            // Apply theme preference
            applyTheme();
        }

        /*
        ==================================================
        UI Rendering Functions
        ==================================================
        */

        /**
         * Renders the tab buttons and empty content containers.
         */
        function renderTabs() {
            const tabNav = document.getElementById('tab-nav');
            const contentArea = document.getElementById('content-area');
            tabNav.innerHTML = '';
            contentArea.innerHTML = '';

            Object.keys(VULN_FEEDS).forEach(key => {
                const displayName = key.charAt(0).toUpperCase() + key.slice(1);
                const count = VULN_DATA[key] ? VULN_DATA[key].length : 0;

                // 1. Create Tab Button
                const button = document.createElement('button');
                button.className = 'tab-button neumorphic';
                button.id = `tab-${key}`;
                button.innerHTML = `${displayName} <span class="count-badge">${count}</span>`;
                button.onclick = () => switchTab(key);
                tabNav.appendChild(button);

                // 2. Create Content Container
                const content = document.createElement('div');
                content.className = 'tab-content';
                content.id = `content-${key}`;
                contentArea.appendChild(content);
            });
        }

        /**
         * Renders the initial summary boxes.
         */
        function renderSummaryDashboard() {
            const summaryDashboard = document.getElementById('summary-dashboard');
            summaryDashboard.innerHTML = '';
            let totalVulnerabilities = 0;

            Object.keys(VULN_FEEDS).forEach(key => {
                const count = VULN_DATA[key] ? VULN_DATA[key].length : 0;
                totalVulnerabilities += count;
                const displayName = key.charAt(0).toUpperCase() + key.slice(1);

                const box = document.createElement('div');
                box.className = 'summary-box neumorphic';
                box.onclick = () => switchTab(key); // Click to switch to the tab
                box.innerHTML = `
                    <h3>${displayName}</h3>
                    <div class="count">${count}</div>
                    <div class="meta">Last Fetched: ${new Date(DATA_FETCHED_TIME).toLocaleDateString()}</div>
                `;
                summaryDashboard.appendChild(box);
            });

            // Add a total count box
            const totalBox = document.createElement('div');
            totalBox.className = 'summary-box neumorphic';
            totalBox.innerHTML = `
                <h3>Total Feeds</h3>
                <div class="count">${totalVulnerabilities}</div>
                <div class="meta">${Object.keys(VULN_FEEDS).length} Sources</div>
            `;
            summaryDashboard.insertBefore(totalBox, summaryDashboard.firstChild);
        }

        /**
         * Renders the vulnerability cards for a specific source after filtering.
         * @param {string} sourceKey - The key of the data source.
         * @param {array} filteredData - The data array to render.
         */
        function renderCards(sourceKey, filteredData) {
            const contentDiv = document.getElementById(`content-${sourceKey}`);
            contentDiv.innerHTML = '';

            if (filteredData.length === 0) {
                contentDiv.innerHTML = `<p style="color: var(--sub-text-color); padding: 20px;">No vulnerabilities found matching the current filters.</p>`;
                return;
            }

            filteredData.forEach(vuln => {
                const card = document.createElement('div');
                card.className = 'vuln-card neumorphic';
                card.onclick = () => showModal(vuln);

                const severityClass = `severity-${vuln.severity.replace(/[^a-zA-Z]/g, '').toUpperCase()}`;

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-id">${vuln.id}</div>
                        <div class="card-severity ${severityClass}">${vuln.severity}</div>
                    </div>
                    <div class="card-title">${vuln.title}</div>
                    <div class="card-meta">
                        <span>Published: ${new Date(vuln.publishedDate).toLocaleDateString()}</span>
                        <span>Source: <a href="${vuln.sourceLink}" target="_blank" onclick="event.stopPropagation();">${vuln.sourceName}</a></span>
                    </div>
                `;
                contentDiv.appendChild(card);
            });
        }

        /**
         * Populates and displays the modal with full vulnerability details.
         * @param {object} vuln - The normalized vulnerability object.
         */
        function showModal(vuln) {
            const modal = document.getElementById('details-modal');
            const modalID = document.getElementById('modal-id');
            const modalSeverity = document.getElementById('modal-severity');
            const modalBody = document.getElementById('modal-body');

            modalID.textContent = vuln.id;
            modalSeverity.textContent = vuln.severity;
            modalSeverity.className = `card-severity severity-${vuln.severity.replace(/[^a-zA-Z]/g, '').toUpperCase()}`;

            let detailHTML = `
                <p><strong>Title:</strong> ${vuln.title}</p>
                <p><strong>Severity:</strong> <span class="${modalSeverity.className}">${vuln.severity}</span></p>
                <p><strong>Published:</strong> ${new Date(vuln.publishedDate).toLocaleString()}</p>
                <p><strong>Modified:</strong> ${new Date(vuln.modifiedDate).toLocaleString()}</p>
                <p><strong>Source:</strong> <a href="${vuln.sourceLink}" target="_blank">${vuln.sourceLink}</a></p>
                <p><strong>Description:</strong></p>
                <div class="full-description">${vuln.description}</div>
            `;

            // Add raw data (if needed, simplified for clean display)
            detailHTML += `
                <details style="margin-top: 20px;">
                    <summary style="font-weight: bold; cursor: pointer; color: var(--text-color);">View Raw Data (JSON)</summary>
                    <pre style="white-space: pre-wrap; word-wrap: break-word; font-size: 0.8em; max-height: 300px; overflow-y: auto; background: var(--bg-color); padding: 10px; border-radius: var(--border-radius); box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);">${JSON.stringify(vuln.rawData, null, 2)}</pre>
                </details>
            `;

            modalBody.innerHTML = detailHTML;
            modal.style.display = 'block';
        }

        /**
         * Hides the modal.
         */
        function closeModal() {
            document.getElementById('details-modal').style.display = 'none';
        }

        /*
        ==================================================
        Interaction Handlers
        ==================================================
        */

        let activeTab = null;

        /**
         * Switches the active tab and triggers card rendering.
         * @param {string} key - The key of the tab to switch to.
         */
        function switchTab(key) {
            // Hide dashboard, show tabs
            document.getElementById('summary-dashboard').style.display = 'none';
            document.getElementById('tab-nav').style.display = 'flex';
            document.getElementById('filter-container').style.display = 'flex';
            
            // Deactivate all
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Activate target
            document.getElementById(`tab-${key}`).classList.add('active');
            document.getElementById(`content-${key}`).classList.add('active');
            activeTab = key;

            // Apply current filters to the new tab
            applyFiltersAndRender(key);
        }

        /**
         * Handles changes in the search input or severity filter.
         */
        function handleFilterChange() {
            if (activeTab) {
                applyFiltersAndRender(activeTab);
            }
        }

        /**
         * Applies the current search and severity filters to the data and re-renders cards.
         * @param {string} sourceKey - The key of the data source to filter.
         */
        function applyFiltersAndRender(sourceKey) {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const severityFilter = document.getElementById('severity-filter').value;
            const data = VULN_DATA[sourceKey] || [];

            const filtered = data.filter(vuln => {
                // Search filter
                const matchesSearch = !searchTerm ||
                    vuln.id.toLowerCase().includes(searchTerm) ||
                    vuln.title.toLowerCase().includes(searchTerm) ||
                    (vuln.description && vuln.description.toLowerCase().includes(searchTerm));

                // Severity filter
                const matchesSeverity = !severityFilter || normalizeSeverity(vuln.severity) === severityFilter;

                return matchesSearch && matchesSeverity;
            });

            renderCards(sourceKey, filtered);
        }

        /**
         * Toggles between dark and light themes.
         */
        function toggleTheme() {
            const body = document.documentElement;
            const toggleButton = document.getElementById('theme-toggle');
            const icon = toggleButton.querySelector('.material-icons');

            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                icon.textContent = 'brightness_4'; // Moon icon
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                icon.textContent = 'light_mode'; // Sun icon
            }
        }

        /**
         * Applies the stored theme preference or system preference on load.
         */
        function applyTheme() {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const toggleButton = document.getElementById('theme-toggle');
            const icon = toggleButton.querySelector('.material-icons');

            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                icon.textContent = 'light_mode';
            } else {
                document.documentElement.removeAttribute('data-theme');
                icon.textContent = 'brightness_4';
            }
        }

        // Initialize the dashboard when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', initializeDashboard);

        // Close modal on ESC key press
        document.onkeydown = function(evt) {
            evt = evt || window.event;
            if (evt.key === 'Escape' && document.getElementById('details-modal').style.display === 'block') {
                closeModal();
            }
        };

        // Initially hide filter bar and tabs, show summary
        document.getElementById('tab-nav').style.display = 'none';
        document.getElementById('filter-container').style.display = 'none';

    </script>
</body>
</html>
